const { useState, useEffect, useRef } = React;

// ─── Cloud sync (Supabase) ────────────────────────────────────────
// Offline-tolerant: writes to localStorage immediately, debounced upload to cloud.
// On first sign-in, any pre-existing local doc is auto-imported.
const SUPABASE_URL = "https://xfocdxswghrvpflbjcos.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhmb2NkeHN3Z2hydnBmbGJqY29zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk0MDgsImV4cCI6MjA5NjY4NTQwOH0.L9FW9JHRtVEOmQw8ceAHkWTzcJPD6lpIihOwF3kXoV8";
const LEGACY_KEY = "wlp_doc";

function useCloudSync(d, setD) {
  const [ready, setReady] = useState(false);
  const [displayName, setDisplayName] = useState("");
  const ctx = useRef({ client: null, userId: null, lkey: null });
  const skipNextSave = useRef(true);
  const bootedRef = useRef(false);

  useEffect(() => {
    if (bootedRef.current) return;
    bootedRef.current = true;
    (async () => {
      try {
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
          auth: { persistSession: false, autoRefreshToken: true },
        });
        ctx.current.client = client;

        const hash = new URLSearchParams(window.location.hash.slice(1));
        const at = hash.get("at"), rt = hash.get("rt");
        if (at && rt) {
          await client.auth.setSession({ access_token: at, refresh_token: rt });
          history.replaceState(null, "", window.location.pathname);
        }
        const { data: { user } } = await client.auth.getUser();
        if (!user) { setReady(true); return; }
        ctx.current.userId = user.id;
        ctx.current.lkey = "wlp_doc_" + user.id;

        let local = null;
        try { local = JSON.parse(localStorage.getItem(ctx.current.lkey) || "null"); } catch {}

        let cloud = null;
        try {
          const { data } = await client.from("user_data")
            .select("value, updated_at").eq("key", "planner").maybeSingle();
          cloud = data;
        } catch (e) { console.warn("cloud read failed (offline?)", e); }

        let chosen = null;
        if (cloud && local) {
          const cT = +new Date(cloud.updated_at), lT = +new Date(local.updated_at || 0);
          chosen = lT > cT ? local.value : cloud.value;
          if (lT > cT) {
            client.from("user_data").upsert({ user_id: user.id, key: "planner", value: local.value });
          }
        } else if (cloud) {
          chosen = cloud.value;
        } else if (local) {
          chosen = local.value;
          client.from("user_data").upsert({ user_id: user.id, key: "planner", value: local.value });
        } else {
          // first-time login: pull any legacy pre-auth local data
          try {
            const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || "null");
            if (legacy && legacy.value) {
              chosen = legacy.value;
              client.from("user_data").upsert({ user_id: user.id, key: "planner", value: legacy.value });
              localStorage.removeItem(LEGACY_KEY);
            }
          } catch {}
        }

        if (chosen && typeof chosen === "object") {
          skipNextSave.current = true;
          setD(chosen);
        }
      } catch (e) {
        console.warn("sync init failed", e);
      } finally {
        setReady(true);
      }
    })();
  }, []);

  // persist on every change: local immediately, cloud debounced
  useEffect(() => {
    if (!ready) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    const { client, userId, lkey } = ctx.current;
    const updated_at = new Date().toISOString();
    if (lkey) {
      try { localStorage.setItem(lkey, JSON.stringify({ value: d, updated_at })); } catch {}
    } else {
      try { localStorage.setItem(LEGACY_KEY, JSON.stringify({ value: d, updated_at })); } catch {}
    }
    if (!client || !userId) return;
    const t = setTimeout(() => {
      client.from("user_data")
        .upsert({ user_id: userId, key: "planner", value: d, updated_at })
        .then(({ error }) => { if (error) console.warn("cloud save failed", error); });
    }, 800);
    return () => clearTimeout(t);
  }, [d, ready]);

  return ready;
}

function useIsDesktop() {
  const [is, setIs] = useState(typeof window !== "undefined" && window.matchMedia("(min-width: 900px)").matches);
  useEffect(() => {
    const mq = window.matchMedia("(min-width: 900px)");
    const fn = (e) => setIs(e.matches);
    mq.addEventListener ? mq.addEventListener("change", fn) : mq.addListener(fn);
    return () => { mq.removeEventListener ? mq.removeEventListener("change", fn) : mq.removeListener(fn); };
  }, []);
  return is;
}

  // monthly reset: wipe habit checks, one-offs, med checks, workout logs, mood grids
  useEffect(() => {
    if (!synced) return;
    const cur = monthKey(now);
    if (d.monthStamp !== cur) {
      setD((p) => ({ ...p, monthStamp: cur, habitChecks: {}, habitOneoffs: {}, medChecks: {}, workoutDone: {},

    }
  }, [now, synced]); // eslint-disable-line

  const go = (tabId, pageId = null) => { setTab(tabId); setPage(pageId); };

  // listen for parent (app shell) messages — e.g. Home button → reset to home tab
  useEffect(() => {
    const handler = (e) => {
      const m = e && e.data;
      if (m && m.type === "go") { setTab(m.tab || "home"); setPage(m.page || null); }
    };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, []);

  const common = { d, setD, now, go, back: () => setPage(null), openMenu: () => setMenuOpen(true), isDesktop };

  // resolve current page
  let view;
  if (page === null) {
    view = { home: <Home {...common} />, money: <Budget {...common} back={() => go("home")} />, health: <HealthHub {...common} />, plan: <PlanHub {...common} />, more: <MoreHub {...common} /> }[tab];
  } else if (page.startsWith("block:")) {

  const moodBlock = d.blocks.find((b) => b.type === "mood");

  const builtin = ["money", "health", "plan", "more"];
  const customCats = [...new Set(d.blocks.map((b) => b.category || "plan").filter((c) => !builtin.includes(c)))];

    { label: "Health", items: [

      { icon: DumbbellIcon, color: BLUE, title: "Workouts", onClick: () => navGo("health", "workouts") },
      { icon: PlateIcon, color: SAGE, title: "Meal Plan", onClick: () => navGo("health", "meals") },

function TrackerCalendar({ d, setD, now, go, isDesktop }) {
  const [overviewDay, setOverviewDay] = useState(null); // Date or null
  const [weekOpen, setWeekOpen] = useState(false);
  const [cursor, setCursor] = useState(new Date(now.getFullYear(), now.getMonth(), 1));
  const dim = daysInMonth(cursor), pad = firstWeekday(cursor);
  const todayK = dayKey(now);
  const dayShells = ["S", "M", "T", "W", "T", "F", "S"];

  // bills due map: day-of-month -> [{ n, color }]
  const billsByDay = {};
  BUDGET_SECTIONS.forEach((sec) => {
    (d.budget[sec.key] || []).forEach((r) => {
      const day = parseInt(r.due, 10);
      if (day >= 1 && day <= 31 && r.n) {
        billsByDay[day] = billsByDay[day] || [];
        billsByDay[day].push({ n: r.n, color: sec.color, a: r.a });
      }
    });
  });

  const moodBlock = (d.blocks || []).find((b) => b.type === "mood");

  const sameMonth = cursor.getFullYear() === now.getFullYear() && cursor.getMonth() === now.getMonth();
  const moodById = (id) => moodBlock && moodBlock.moods.find((m) => m.id === id);

  const cellInfo = (day) => {
    const dt = new Date(cursor.getFullYear(), cursor.getMonth(), day);
    const k = dayKey(dt);
    const hc = dayCompletion(d, dt);
    const habitsPct = hc.total ? hc.done / hc.total : 0;
    const medsCount = d.meds.filter((m) => medFullyTaken((d.medChecks[k] || {})[m.id], medTimes(m))).length;
    const medsAll = d.meds.length > 0 && medsCount === d.meds.length;
    const workoutLogged = !!(d.workoutDone && d.workoutDone[k] && Object.keys(d.workoutDone[k]).length);
    const moodId = sameMonth && moodBlock && moodBlock.days ? moodBlock.days[day] : null;
    const mood = moodId ? moodById(moodId) : null;
    const moodLogged = !!mood;
    const bills = billsByDay[day] || [];
    return { dt, k, habitsPct, habitsTotal: hc.total, habitsDone: hc.done, medsCount, medsAll, workoutLogged, moodLogged, mood, bills };
  };


  const prevMonth = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1));
  const nextMonth = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1));

  return (
    <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 24, padding: "18px 18px 16px", boxShadow: "0 8px 24px -18px rgba(22,32,28,.4)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 8 }}>
        <button onClick={prevMonth} className="pop" style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 999, width: 28, height: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={INK} strokeWidth="2.4" strokeLinecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, justifyContent: "center" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 18, color: TEXT }}>{cursor.toLocaleDateString("en-US", { month: "long", year: "numeric" })}</div>
          <button onClick={() => setWeekOpen(true)} className="pop" style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 999, padding: "4px 10px", fontSize: 10, fontWeight: 700, letterSpacing: ".12em", textTransform: "uppercase", color: TEXT, cursor: "pointer" }}>Week view</button>
        </div>
        <button onClick={nextMonth} className="pop" style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 999, width: 28, height: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={INK} strokeWidth="2.4" strokeLinecap="round"><polyline points="9,6 15,12 9,18"/></svg></button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 6 }}>
        {dayShells.map((s, i) => <div key={i} style={{ fontSize: 10, fontWeight: 700, color: MUTED, textAlign: "center", letterSpacing: ".1em" }}>{s}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {Array.from({ length: pad }).map((_, i) => <div key={"p" + i} />)}
        {Array.from({ length: dim }, (_, i) => {
          const day = i + 1;
          const info = cellInfo(day);
          const isToday = info.k === todayK;
          const hasBills = info.bills.length > 0;
          const tip = [
            isToday ? "Today" : info.dt.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }),
            info.habitsTotal ? `Habits ${info.habitsDone}/${info.habitsTotal}` : null,
            info.medsCount ? `Meds ${info.medsCount}` : null,
            info.workoutLogged ? "Workout logged" : null,
            info.moodLogged ? "Mood logged" : null,
            hasBills ? `Due: ${info.bills.map((b) => b.n).join(", ")}` : null,
          ].filter(Boolean).join(" · ");
          return (
            <div
              key={day}
              title={tip}
              onClick={() => setOverviewDay(info.dt)}
              className="pop"
              style={{
                position: "relative",
                aspectRatio: "1",
                borderRadius: 8,
                background: isToday && info.mood ? info.mood.color : isToday ? INK : info.mood ? info.mood.color + "33" : PAPER,
                border: hasBills ? `1.5px solid ${AMBER}` : isToday && info.mood ? `1.5px solid ${info.mood.color}` : `1px solid ${LINE}`,
                color: isToday ? PAPER : INK,
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                justifyContent: "flex-start",
                padding: "4px 2px 3px",
                cursor: "pointer",
                overflow: "hidden",
              }}
            >
              <div style={{ fontSize: 11, fontWeight: 700, lineHeight: 1 }}>{day}</div>
              {/* habit ring */}
              {info.habitsTotal > 0 && (
                <div style={{ width: "70%", height: 2, background: isToday ? "rgba(255,255,255,.25)" : LINE, borderRadius: 999, marginTop: 3, overflow: "hidden" }}>
                  <div style={{ width: `${info.habitsPct * 100}%`, height: "100%", background: info.habitsPct === 1 ? SAGEHI : SAGE }} />
                </div>
              )}
              {/* dots */}
              <div style={{ display: "flex", gap: 2, marginTop: "auto" }}>
                {info.medsAll && <span style={{ width: 4, height: 4, borderRadius: 999, background: PLUM }} />}
                {info.workoutLogged && <span style={{ width: 4, height: 4, borderRadius: 999, background: BLUE }} />}
                {info.moodLogged && !isToday && <span style={{ width: 4, height: 4, borderRadius: 999, background: info.mood.color }} />}
                {hasBills && <span style={{ width: 4, height: 4, borderRadius: 999, background: AMBER, boxShadow: `0 0 0 1px ${isToday ? INK : PAPER}` }} />}
              </div>
            </div>

          );
        })}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 12, fontSize: 10, color: MUTED, fontWeight: 600, letterSpacing: ".06em" }}>
        <Legend color={SAGE} label="Habits" />
        <Legend color={PLUM} label="Meds" />
        <Legend color={BLUE} label="Workout" />
        <Legend color={AMBER} label="Mood" />
        <Legend color={AMBER} label="Bill due" ring />
      </div>
      {overviewDay && <DayOverview d={d} setD={setD} dt={overviewDay} onClose={() => setOverviewDay(null)} go={go} isDesktop={isDesktop} />}
      {weekOpen && <WeekOverview d={d} anchor={overviewDay || now} onClose={() => setWeekOpen(false)} go={go} isDesktop={isDesktop} onPickDay={(dt) => { setWeekOpen(false); setOverviewDay(dt); }} />}
    </div>
  );
}

// ─── Day & Week Overview ────────────────────────────────────────
function dayBundle(d, dt) {
  const k = dayKey(dt);
  const dayNum = dt.getDate();
  const sameMonth = dt.getFullYear() === new Date().getFullYear() && dt.getMonth() === new Date().getMonth();
  const checks = d.habitChecks[k] || {};
  const oneoffs = d.habitOneoffs[k] || [];
  const habits = [
    ...d.habitDefs.map((h) => ({ id: h.id, n: h.n, done: !!checks[h.id], recurring: true })),
    ...oneoffs.map((o) => ({ id: o.id, n: o.n, done: !!o.done, recurring: false })),
  ];
  const medsList = d.meds.map((m) => {
    const t = medTimes(m);
    const done = medDoneCount((d.medChecks[k] || {})[m.id], t);
    return { id: m.id, n: m.n, dose: m.dose, done, times: t };
  });
  const workoutDone = d.workoutDone && d.workoutDone[k] ? d.workoutDone[k] : {};
  const workouts = Object.keys(workoutDone).map((wid) => {
    const w = d.workouts.find((x) => x.id === wid);
    if (!w) return null;
    const exDone = workoutDone[wid] || {};
    const doneCount = (w.ex || []).filter((e) => exDone[e.id]).length;
    return { id: wid, n: w.n, cat: catOf(w.cat), done: doneCount, total: (w.ex || []).length };
  }).filter(Boolean);
  const moodBlock = (d.blocks || []).find((b) => b.type === "mood");
  const moodId = sameMonth && moodBlock && moodBlock.days ? moodBlock.days[dayNum] : null;
  const mood = moodId && moodBlock ? moodBlock.moods.find((m) => m.id === moodId) : null;
  const bills = [];
  BUDGET_SECTIONS.forEach((sec) => {
    (d.budget[sec.key] || []).forEach((r) => {
      const day = parseInt(r.due, 10);
      if (day === dayNum && r.n) bills.push({ n: r.n, a: r.a, color: sec.color, section: sec.label });
    });
  });
  const weekdayShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()];
  const meal = (d.meals && d.meals[weekdayShort]) || "";
  return { habits, medsList, workouts, mood, bills, meal, weekdayShort };
}

            <div style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: MIST, fontWeight: 700 }}>{sub}</div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, fontWeight: 600, lineHeight: 1.1, marginTop: 4 }}>{title}</div>
          </div>
          <button onClick={onClose} className="pop" style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 999, width: 32, height: 32, color: PAPER, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><XIcon c={PAPER} s={16} /></button>
        </div>
        <div style={{ padding: "18px 18px 22px" }}>{children}</div>
      </div>
    </div>
  );
}

function OverviewBlock({ label, color, count, children, onClick }) {
  return (
    <div onClick={onClick} className={onClick ? "pop" : ""} style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${color}`, borderRadius: 8, padding: "12px 14px", cursor: onClick ? "pointer" : "default" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: count != null || children ? 8 : 0 }}>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED }}>{label}</div>
        {count != null && <div style={{ fontSize: 12, fontWeight: 700, color }}>{count}</div>}
      </div>
      {children}
    </div>
  );
}

function DayOverview({ d, setD, dt, onClose, go, isDesktop }) {
  const b = dayBundle(d, dt);
  const isToday = dayKey(dt) === dayKey(new Date());
  const title = dt.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const habitsDone = b.habits.filter((h) => h.done).length;
  const medsDone = b.medsList.reduce((s, m) => s + (m.done >= m.times ? 1 : 0), 0);
  const k = dayKey(dt);
  const note = (d.dayNotes && d.dayNotes[k]) || "";
  const setNote = (v) => setD && setD({ ...d, dayNotes: { ...(d.dayNotes || {}), [k]: v } });
  const anything = b.habits.length || b.medsList.length || b.workouts.length || b.mood || b.bills.length || b.meal;
  return (

              {b.bills.map((bl, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13 }}>

            <div style={{ display: "grid", gap: 5 }}>

                  <span style={{ color: h.done ? MUTED : INK, fontWeight: 600, textDecoration: h.done ? "line-through" : "none" }}>{h.n || "(unnamed)"}</span>

function WeekOverview({ d, anchor, onClose, go, isDesktop, onPickDay }) {
  const start = new Date(anchor); start.setDate(anchor.getDate() - anchor.getDay());
  const days = Array.from({ length: 7 }, (_, i) => { const dt = new Date(start); dt.setDate(start.getDate() + i); return dt; });
  const endLabel = new Date(start); endLabel.setDate(start.getDate() + 6);
  const sub = `${start.toLocaleDateString("en-US", { month: "short", day: "numeric" })} – ${endLabel.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;
  const todayK = dayKey(new Date());
  return (
    <OverviewShell title="Week at a glance" sub={sub} onClose={onClose} width={isDesktop ? 1100 : 560}>
      <div style={{ display: "grid", gap: 10, gridTemplateColumns: isDesktop ? "repeat(7, minmax(0, 1fr))" : "1fr" }}>
        {days.map((dt) => {
          const b = dayBundle(d, dt);
          const k = dayKey(dt);
          const isToday = k === todayK;
          const habitsDone = b.habits.filter((h) => h.done).length;
          const medsDone = b.medsList.reduce((s, m) => s + (m.done >= m.times ? 1 : 0), 0);
          return (
            <div key={k} onClick={() => onPickDay(dt)} className="pop" style={{ background: isToday ? INK : CARD, color: isToday ? PAPER : INK, border: `1px solid ${isToday ? INK : LINE}`, borderRadius: 14, padding: "14px 14px", cursor: "pointer", display: "flex", flexDirection: "column", gap: 8, minHeight: isDesktop ? 220 : "auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <div>
                  <div style={{ fontSize: 9, letterSpacing: ".2em", textTransform: "uppercase", fontWeight: 700, color: isToday ? MIST : MUTED }}>{dt.toLocaleDateString("en-US", { weekday: "short" })}</div>
                  <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, fontWeight: 600, lineHeight: 1 }}>{dt.getDate()}</div>
                </div>
                {b.mood && <div title={b.mood.label} style={{ width: 14, height: 14, borderRadius: 4, background: b.mood.color, border: isToday ? `1.5px solid ${PAPER}` : "none" }} />}
              </div>
              <div style={{ display: "grid", gap: 4, fontSize: 11, fontWeight: 600 }}>
                {b.habits.length > 0 && <Row isToday={isToday} color={SAGE} label="Habits" val={`${habitsDone}/${b.habits.length}`} />}
                {b.medsList.length > 0 && <Row isToday={isToday} color={PLUM} label="Meds" val={`${medsDone}/${b.medsList.length}`} />}
                {b.workouts.length > 0 && <Row isToday={isToday} color={BLUE} label="Workout" val={`${b.workouts.length}`} />}
                {b.bills.length > 0 && <Row isToday={isToday} color={AMBER} label="Bills" val={`${b.bills.length}`} />}
                {b.meal && <Row isToday={isToday} color={SAGE} label="Meal" val={b.meal.length > 14 ? b.meal.slice(0, 14) + "…" : b.meal} />}
                {b.habits.length === 0 && b.medsList.length === 0 && b.workouts.length === 0 && b.bills.length === 0 && !b.meal && !b.mood && (
                  <div style={{ fontSize: 11, color: isToday ? MIST : MUTED, fontStyle: "italic", fontFamily: "'DM Serif Display',serif" }}>Nothing tracked</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </OverviewShell>
  );
}

// ═══ NEW TOOL: MEDS ═══════════════════════════════════════════════
function Meds({ d, setD, now, back }) {
  const [view, setView] = useState("week");
  const [sel, setSel] = useState(new Date(now));
  const selKey = dayKey(sel);
  const [edit, setEdit] = useState(false);
  const checks = d.medChecks[selKey] || {};

  const toggle = (id, idx, times) => {
    const day = { ...(d.medChecks[selKey] || {}) };
    const arr = medDoseArr(day[id], times);
    arr[idx] = !arr[idx];
    day[id] = arr;
    setD({ ...d, medChecks: { ...d.medChecks, [selKey]: day } });
  };
  const setMed = (id, f, v) => setD({ ...d, meds: d.meds.map((m) => m.id === id ? { ...m, [f]: v } : m) });
  const setTimes = (id, t) => setD({ ...d, meds: d.meds.map((m) => m.id === id ? { ...m, times: Math.max(1, Math.min(12, t)) } : m) });
  const addMed = () => setD({ ...d, meds: [...d.meds, { id: uid(), n: "", dose: "", times: 1 }] });
  const delMed = (id) => setD({ ...d, meds: d.meds.filter((m) => m.id !== id) });

  const weekStart = new Date(sel); weekStart.setDate(sel.getDate() - sel.getDay());
  const weekDays = Array.from({ length: 7 }, (_, i) => { const dt = new Date(weekStart); dt.setDate(weekStart.getDate() + i); return dt; });
  const dim = daysInMonth(sel), pad = firstWeekday(sel);
  const medsTakenOn = (dt) => { const c = d.medChecks[dayKey(dt)] || {}; return d.meds.filter((m) => medFullyTaken(c[m.id], medTimes(m))).length; };
  const selLabel = sel.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

  return (
    <Screen title="Medications" sub="Daily doses" back={back} accent={PLUM}>
      <DayViewToggle view={view} setView={setView} />
      {view === "week"
        ? <WeekStrip weekDays={weekDays} sel={sel} setSel={setSel} now={now} doneFor={(dt) => medsTakenOn(dt)} totalFor={() => d.meds.length} />
        : <MonthGrid sel={sel} setSel={setSel} now={now} fillFor={(dt) => { const t = d.meds.length, done = medsTakenOn(dt); return t && done === t ? PLUM : done ? PLUM + "33" : null; }} />}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 0 10px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: TEXT, fontFamily: "'DM Serif Display',serif" }}>{selLabel}</div>
        <div className="pop" onClick={() => setEdit(!edit)} style={{ fontSize: 12, fontWeight: 700, color: PLUM, cursor: "pointer" }}>{edit ? "Done" : "Edit meds"}</div>
      </div>

      {edit ? (
        <div style={{ display: "grid", gap: 9 }}>
          {d.meds.map((m) => {
            const t = medTimes(m);
            return (
            <div key={m.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 14px", display: "grid", gap: 7 }}>
              <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
                <input value={m.n} onChange={(e) => setMed(m.id, "n", e.target.value)} placeholder="Medication name" style={{ flex: 1, border: `1px solid ${LINE}`, borderRadius: 3, padding: "9px 11px", fontSize: 14, fontWeight: 600 }} />
                <div className="pop" onClick={() => delMed(m.id)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={MUTED} s={15} /></div>
              </div>
              <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
                <input value={m.dose} onChange={(e) => setMed(m.id, "dose", e.target.value)} placeholder="Dose (e.g. 200 mg)" style={{ flex: 1, border: `1px solid ${LINE}`, borderRadius: 3, padding: "9px 11px", fontSize: 13 }} />
                <div style={{ display: "flex", alignItems: "center", gap: 6, border: `1px solid ${LINE}`, borderRadius: 3, padding: "4px 8px", background: CARD }}>
                  <div className="pop" onClick={() => setTimes(m.id, t - 1)} style={{ cursor: "pointer", fontWeight: 700, color: PLUM, fontSize: 16, width: 18, textAlign: "center" }}>−</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: TEXT, minWidth: 56, textAlign: "center" }}>{t}×/day</div>
                  <div className="pop" onClick={() => setTimes(m.id, t + 1)} style={{ cursor: "pointer", fontWeight: 700, color: PLUM, fontSize: 16, width: 18, textAlign: "center" }}>+</div>
                </div>
              </div>
            </div>
            );
          })}
          <button onClick={addMed} style={addBtn}>+ Add a medication</button>
        </div>
      ) : (
        <div style={{ display: "grid", gap: 9 }}>
          {d.meds.length === 0 && <Note>No meds yet. Tap "Edit meds" to add your first.</Note>}
          {d.meds.map((m) => {
            const t = medTimes(m);
            const doses = medDoseArr(checks[m.id], t);
            const doneCount = doses.filter(Boolean).length;
            const allTaken = doneCount >= t;
            return (
              <div key={m.id} style={{ background: allTaken ? INK : CARD, color: allTaken ? PAPER : INK, borderRadius: 4, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, border: allTaken ? "none" : `1px solid ${LINE}`, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, textDecoration: allTaken ? "line-through" : "none" }}>{m.n || "Unnamed"}</div>
                  <div style={{ fontSize: 12, color: allTaken ? "rgba(244,241,234,.6)" : MUTED }}>{[m.dose, t > 1 ? `${doneCount}/${t} today` : null].filter(Boolean).join(" · ")}</div>
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {doses.map((on, i) => (
                    <div key={i} className="pop" onClick={() => toggle(m.id, i, t)} title={`Dose ${i + 1}`} style={{ width: 30, height: 30, borderRadius: 3, border: `2px solid ${on ? SAGEHI : PLUM}`, background: on ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer" }}>
                      {on ? <CheckIcon c={INK} s={15} /> : <span style={{ fontSize: 11, fontWeight: 700, color: allTaken ? PAPER : MUTED }}>{i + 1}</span>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      <p style={tip}>Check off each dose as you take it. Tracking resets each month so every month starts fresh.</p>
    </Screen>
  );
}

// ═══ NEW TOOL: WORKOUTS ═══════════════════════════════════════════
function Workouts({ d, setD, go, back, now }) {
  const [sel, setSel] = useState(new Date(now));
  const addWorkout = () => {
    const w = { id: uid(), n: "New workout", cat: "other", ex: [{ id: uid(), n: "", sets: "", reps: "", w: "" }] };
    setD({ ...d, workouts: [...d.workouts, w] });
    go("health", "workout:" + w.id);
  };

  // categories done on a given date (any exercise of that workout checked)
  const catsDoneOn = (dt) => {
    const dayLog = d.workoutDone[dayKey(dt)] || {};
    const set = new Set();
    d.workouts.forEach((w) => {
      const wl = dayLog[w.id] || {};
      if (w.ex.some((e) => wl[e.id])) set.add(w.cat || "other");
    });
    return [...set];
  };
  const fullDoneOn = (dt) => {
    const dayLog = d.workoutDone[dayKey(dt)] || {};
    const set = new Set();
    d.workouts.forEach((w) => {
      const wl = dayLog[w.id] || {};
      if (w.ex.length && w.ex.every((e) => wl[e.id])) set.add(w.cat || "other");
    });
    return set;
  };

  // monthly stats
  const dim = daysInMonth(sel);
  const activeDays = (() => { let n = 0; for (let i = 1; i <= dim; i++) if (catsDoneOn(new Date(sel.getFullYear(), sel.getMonth(), i)).length) n++; return n; })();
  const usedCats = (() => { const s = new Set(); for (let i = 1; i <= dim; i++) catsDoneOn(new Date(sel.getFullYear(), sel.getMonth(), i)).forEach((c) => s.add(c)); return [...s]; })();

  const pad = firstWeekday(sel);
  const selKey = dayKey(sel);
  const selCats = catsDoneOn(sel);

  return (
    <Screen title="Workouts" sub="Train, log, track" back={back} accent={BLUE}>
      {/* CALENDAR */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "16px 14px", marginBottom: 14 }}>
        <div style={{ textAlign: "center", fontSize: 14, fontWeight: 700, color: TEXT, marginBottom: 10, fontFamily: "'DM Serif Display',serif" }}>
          {sel.toLocaleDateString("en-US", { month: "long", year: "numeric" })}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 5, marginBottom: 5 }}>
          {["S", "M", "T", "W", "T", "F", "S"].map((w, i) => <div key={i} style={{ textAlign: "center", fontSize: 9.5, fontWeight: 700, color: MUTED }}>{w}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 5 }}>
          {Array.from({ length: pad }).map((_, i) => <div key={"p" + i} />)}
          {Array.from({ length: dim }).map((_, i) => {
            const day = i + 1;
            const dt = new Date(sel.getFullYear(), sel.getMonth(), day);
            const cats = catsDoneOn(dt);
            const full = fullDoneOn(dt);
            const isSel = day === sel.getDate();
            const isTod = dayKey(dt) === dayKey(now);
            return (
              <div key={day} className="pop" onClick={() => setSel(dt)}
                style={{ aspectRatio: "1", borderRadius: 4, background: CARD, border: isSel ? `2px solid ${INK}` : isTod ? `2px solid ${SAGEHI}` : `1px solid ${LINE}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", padding: "4px 2px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: TEXT }}>{day}</div>
                <div style={{ display: "flex", gap: 2, flexWrap: "wrap", justifyContent: "center", minHeight: 6 }}>
                  {cats.slice(0, 4).map((c) => {
                    const col = catOf(c).color;
                    const solid = full.has(c);
                    return <div key={c} style={{ width: 6, height: 6, borderRadius: "50%", background: solid ? col : col + "55", border: solid ? "none" : `1px solid ${col}` }} />;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* LEGEND */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
        {WORKOUT_CATS.filter((c) => d.workouts.some((w) => (w.cat || "other") === c.id)).map((c) => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, color: TEXT, background: CARD, border: `1px solid ${LINE}`, borderRadius: 99, padding: "4px 10px" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: c.color }} />{c.label}
          </div>
        ))}

function WorkoutEditor({ workout, d, setD, now, back }) {
  const [mode, setMode] = useState("log"); // log | build
  const [sel, setSel] = useState(new Date(now));
  const selKey = dayKey(sel);
  const log = (d.workoutDone[selKey] || {})[workout.id] || {};
  const cat = catOf(workout.cat);

  const update = (patch) => setD({ ...d, workouts: d.workouts.map((w) => w.id === workout.id ? { ...w, ...patch } : w) });
  const del = () => { setD({ ...d, workouts: d.workouts.filter((w) => w.id !== workout.id) }); back(); };
  const setEx = (id, f, v) => update({ ex: workout.ex.map((e) => e.id === id ? { ...e, [f]: v } : e) });
  const addEx = () => update({ ex: [...workout.ex, { id: uid(), n: "", sets: "", reps: "", w: "" }] });
  const delEx = (id) => update({ ex: workout.ex.filter((e) => e.id !== id) });
  const toggleEx = (id) => { const day = { ...(d.workoutDone[selKey] || {}) }; const wl = { ...(day[workout.id] || {}) }; wl[id] = !wl[id]; day[workout.id] = wl; setD({ ...d, workoutDone: { ...d.workoutDone, [selKey]: day } }); };

  const exTotal = workout.ex.length;
  const doneCount = workout.ex.filter((e) => log[e.id]).length;
  const selLabel = sel.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

  // simple 7-day strip ending today
  const stripDays = Array.from({ length: 7 }, (_, i) => { const dt = new Date(now); dt.setDate(now.getDate() - (6 - i)); return dt; });

  return (
    <div className="fade">
      <div style={{ background: INK, color: PAPER, padding: "26px 22px 22px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
          <div onClick={back} className="pop" style={{ width: 40, height: 40, borderRadius: 3, border: `1px solid rgba(255,255,255,.25)`, display: "flex", alignItems: "center", justifyContent: "center" }}><ChevIcon c={PAPER} dir="left" /></div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase", color: MIST, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: cat.color }} /> {cat.label}
            </div>
          </div>
          <div onClick={del} className="pop" style={{ cursor: "pointer", color: MIST }}><TrashIcon c={MIST} s={18} /></div>
        </div>
        <input value={workout.n} onChange={(e) => update({ n: e.target.value })} placeholder="Name this workout" style={{ border: "none", background: "none", color: PAPER, fontFamily: "'DM Serif Display',serif", fontSize: 32, fontWeight: 600, width: "100%", letterSpacing: "-.02em" }} />
      </div>

      <div style={{ padding: "18px 18px 50px" }}>
        <div style={{ display: "flex", gap: 6, background: "#EAE6DB", borderRadius: 4, padding: 4, marginBottom: 16 }}>
          {[["log", "Log"], ["build", "Build"]].map(([v, lbl]) => (
            <div key={v} className="pop" onClick={() => setMode(v)} style={{ flex: 1, textAlign: "center", padding: "9px", borderRadius: 3, fontSize: 13, fontWeight: 700, background: mode === v ? CARD : "transparent", color: mode === v ? INK : MUTED }}>{lbl}</div>
          ))}
        </div>

        {mode === "log" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, marginBottom: 14 }}>
              {stripDays.map((dt) => {
                const k = dayKey(dt);
                const wl = (d.workoutDone[k] || {})[workout.id] || {};
                const done = workout.ex.filter((e) => wl[e.id]).length;
                const isSel = k === selKey, isTod = k === dayKey(now);
                return (
                  <div key={k} className="pop" onClick={() => setSel(new Date(dt))} style={{ borderRadius: 4, padding: "8px 2px", textAlign: "center", background: isSel ? INK : CARD, color: isSel ? PAPER : INK, border: isTod && !isSel ? `2px solid ${SAGEHI}` : `1px solid ${LINE}` }}>
                    <div style={{ fontSize: 9.5, fontWeight: 700, color: isSel ? MIST : MUTED }}>{"SMTWTFS"[dt.getDay()]}</div>
                    <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 17, fontWeight: 600, margin: "2px 0" }}>{dt.getDate()}</div>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", margin: "0 auto", background: exTotal && done === exTotal ? cat.color : done ? cat.color + "55" : (isSel ? "rgba(255,255,255,.25)" : LINE) }} />
                  </div>
                );
              })}
            </div>

            <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "16px 18px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

              <DumbbellIcon c={SAGEHI} s={30} />
            </div>
            <div style={{ display: "grid", gap: 9 }}>
              {workout.ex.map((e) => {
                const done = !!log[e.id];
                return (
                  <div key={e.id} style={{ background: done ? INK : CARD, color: done ? PAPER : INK, borderRadius: 4, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, border: done ? "none" : `1px solid ${LINE}` }}>
                    <div className="pop" onClick={() => toggleEx(e.id)} style={{ width: 28, height: 28, borderRadius: 3, border: `2px solid ${done ? SAGEHI : cat.color}`, background: done ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{done && <CheckIcon c={INK} s={15} />}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, textDecoration: done ? "line-through" : "none" }}>{e.n || "Exercise"}</div>
                      <div style={{ fontSize: 12, color: done ? "rgba(244,241,234,.6)" : MUTED }}>{[e.sets && `${e.sets} sets`, e.reps && `${e.reps} reps`, e.w && `${e.w}`].filter(Boolean).join(" · ")}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <p style={tip}>Pick a day, then check off each exercise as you finish it. The calendar on the Workouts page shows what categories you trained.</p>
          </>
        )}

        {mode === "build" && (
          <>
            <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 11, letterSpacing: ".08em", textTransform: "uppercase", color: MUTED, fontWeight: 700, marginBottom: 8 }}>Category</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {WORKOUT_CATS.map((c) => {
                  const active = (workout.cat || "other") === c.id;
                  return (
                    <div key={c.id} className="pop" onClick={() => update({ cat: c.id })}
                      style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 11px", borderRadius: 99, fontSize: 12, fontWeight: 700, cursor: "pointer",
                        background: active ? c.color : "transparent", color: active ? "#fff" : INK, border: `1px solid ${active ? c.color : LINE}` }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: active ? "#fff" : c.color }} />{c.label}
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ display: "grid", gap: 11 }}>
              {workout.ex.map((e) => (
                <div key={e.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "14px 15px" }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 9 }}>
                    <input value={e.n} onChange={(ev) => setEx(e.id, "n", ev.target.value)} placeholder="Exercise name" style={{ flex: 1, border: "none", fontSize: 15, fontWeight: 700, background: "none" }} />
                    <div className="pop" onClick={() => delEx(e.id)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={MUTED} s={15} /></div>
                  </div>
                  <div style={{ display: "flex", gap: 7 }}>
                    {[["sets", "Sets"], ["reps", "Reps"], ["w", "Weight"]].map(([f, ph]) => (
                      <div key={f} style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, letterSpacing: ".08em", textTransform: "uppercase", color: MUTED, fontWeight: 700, marginBottom: 3 }}>{ph}</div>
                        <input value={e[f]} onChange={(ev) => setEx(e.id, f, ev.target.value)} placeholder="—" style={{ width: "100%", border: `1px solid ${LINE}`, borderRadius: 3, padding: "8px 10px", fontSize: 14, fontWeight: 600, textAlign: "center" }} />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addEx} style={{ ...addBtn, marginTop: 12 }}>+ Add an exercise</button>
            <p style={tip}>Tag your workout with a category so it color-codes on the calendar. Add each exercise with its sets, reps and weight.</p>
          </>
        )}
      </div>
    </div>
  );
}

function Budget({ d, setD, back }) {
  const pay = Number(d.pay) || 0, spent = budgetSpent(d), left = pay - spent, pct = pay ? Math.min(1, spent / pay) : 0;
  const setRow = (key, id, field, v) => setD({ ...d, budget: { ...d.budget, [key]: (d.budget[key]||[]).map((r) => r.id === id ? { ...r, [field]: v } : r) } });
  const addRow = (key) => setD({ ...d, budget: { ...d.budget, [key]: [...(d.budget[key]||[]), { id: uid(), n: "", a: "", due: "" }] } });
  const delRow = (key, id) => setD({ ...d, budget: { ...d.budget, [key]: (d.budget[key]||[]).filter((r) => r.id !== id) } });

  // custom expense categories
  const customSections = d.customBudgetSections || [];
  const sectionColors = ["#8a6b9c", "#4f7a8c", "#C4717A", "#7d8a5e", "#a05b5b", "#5a8a7d"];
  const addSection = () => {
    const label = (typeof window !== "undefined" ? window.prompt("Name this expense category", "") : "") || "";
    const name = label.trim();
    if (!name) return;
    const key = "c_" + uid();
    const color = sectionColors[(customSections.length) % sectionColors.length];
    setD({
      ...d,
      customBudgetSections: [...customSections, { key, label: name, hint: "Custom expenses", color }],
      budget: { ...d.budget, [key]: [{ id: uid(), n: "", a: "", due: "" }] },
    });
  };
  const delSection = (key) => {
    if (typeof window !== "undefined" && !window.confirm("Remove this category and its lines?")) return;
    const nextBudget = { ...d.budget }; delete nextBudget[key];
    setD({ ...d, budget: nextBudget, customBudgetSections: customSections.filter((s) => s.key !== key) });
  };
  const allSections = [...BUDGET_SECTIONS, ...customSections.map((s) => ({ ...s, custom: true }))];

  // savings goals
  const goals = d.savingsGoals || [];
  const setGoal = (id, patch) => setD({ ...d, savingsGoals: goals.map((g) => g.id === id ? { ...g, ...patch } : g) });
  const addGoal = () => setD({ ...d, savingsGoals: [...goals, { id: uid(), n: "", target: "", saved: "", color: SAGE }] });
  const delGoal = (id) => setD({ ...d, savingsGoals: goals.filter((g) => g.id !== id) });
  const goalColors = [SAGE, AMBER, PLUM, BLUE, "#9aa777"];

  return (
    <Screen title="Budget" sub="This paycheck" back={back} accent={AMBER}>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "16px 18px", marginBottom: 14 }}>
        <label style={{ ...lbl, color: MIST }}>Take-home pay</label>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ fontSize: 30, fontFamily: "'DM Serif Display',serif", fontWeight: 600, color: SAGEHI }}>$</span><input inputMode="decimal" value={d.pay} onChange={(e) => setD({ ...d, pay: e.target.value })} placeholder="0" style={{ border: "none", flex: 1, fontSize: 30, fontFamily: "'DM Serif Display',serif", fontWeight: 600, background: "none", color: PAPER }} /></div>
      </div>
      {allSections.map((sec) => (
        <div key={sec.key} style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${sec.color}`, borderRadius: 4, padding: "15px 16px", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, gap: 8 }}>
            <div style={{ minWidth: 0 }}><div style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-.01em" }}>{sec.label}</div><div style={{ fontSize: 12, color: MUTED }}>{sec.hint}</div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 18, color: sec.color, whiteSpace: "nowrap" }}>${money(sectionTotal(d, sec.key))}</div>
              {sec.custom && <div className="pop" onClick={() => delSection(sec.key)} title="Remove category" style={{ cursor: "pointer", opacity: .35 }}><XIcon c={MUTED} s={15} /></div>}
            </div>
          </div>
          <div style={{ display: "grid", gap: 7 }}>
            {(d.budget[sec.key] || []).map((r) => (
              <div key={r.id} style={{ display: "flex", gap: 7, alignItems: "center", flexWrap: "wrap" }}>
                <input value={r.n} onChange={(e) => setRow(sec.key, r.id, "n", e.target.value)} placeholder="What for" style={{ flex: "1 1 120px", minWidth: 0, border: `1px solid ${LINE}`, borderRadius: 3, padding: "9px 11px", fontSize: 14, fontWeight: 500 }} />
                <div title="Day of month due (1–31)" style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 8px", width: 78, background: PAPER }}>
                  <span style={{ color: MUTED, fontSize: 11, fontWeight: 700, letterSpacing: ".08em" }}>DUE</span>
                  <input inputMode="numeric" maxLength={2} value={r.due || ""} onChange={(e) => { const v = e.target.value.replace(/\D/g, "").slice(0,2); setRow(sec.key, r.id, "due", v); }} placeholder="—" style={{ border: "none", width: "100%", textAlign: "right", padding: "9px 0 9px 4px", fontSize: 13, fontWeight: 700, background: "none" }} />
                </div>
                <div style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 10px", width: 96 }}><span style={{ color: MUTED, fontSize: 13 }}>$</span><input inputMode="decimal" value={r.a} onChange={(e) => setRow(sec.key, r.id, "a", e.target.value)} placeholder="0" style={{ border: "none", width: "100%", textAlign: "right", padding: "9px 0 9px 4px", fontSize: 14, fontWeight: 600, background: "none" }} /></div>
                <div className="pop" onClick={() => delRow(sec.key, r.id)} style={{ cursor: "pointer", opacity: .35 }}><XIcon c={MUTED} s={15} /></div>
              </div>
            ))}
          </div>
          <button onClick={() => addRow(sec.key)} style={{ marginTop: 10, background: "none", border: "none", color: sec.color, fontWeight: 700, fontSize: 13, cursor: "pointer", padding: 0 }}>+ Add a line</button>
        </div>
      ))}
      <button onClick={addSection} style={{ ...addBtn, borderColor: PLUM, color: PLUM, marginBottom: 14 }}>+ Add expense category</button>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "22px 24px", marginTop: 6 }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: MIST, marginBottom: 6 }}><span>Take-home pay</span><span style={{ fontWeight: 700, color: PAPER }}>${money(pay)}</span></div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: MIST, marginBottom: 10 }}><span>Everything assigned</span><span style={{ fontWeight: 700, color: PAPER }}>− ${money(spent)}</span></div>

        <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", fontWeight: 700, color: left < 0 ? AMBER : MIST }}>{left < 0 ? "Over by" : "Left to allocate"}</div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "0 2px 10px" }}>

          <button onClick={addGoal} style={{ ...addBtn, borderColor: SAGE, color: SAGE }}>+ Add a savings goal</button>

      </div>

      {(() => {

}

const BUILTIN_CATEGORIES = ["money", "health", "plan", "more"];
const CATEGORY_LABEL = { money: "Money", health: "Health", plan: "Plan", more: "More" };
function getCategories(d) {
  const custom = [...new Set(d.blocks.map((b) => b.category || "plan").filter((c) => !BUILTIN_CATEGORIES.includes(c)))];
  return [...BUILTIN_CATEGORIES, ...custom];
}
function makeBlock(type, category, title) {
  const t = (title || "").trim() || ({ checklist: "New checklist", list: "New list", schedule: "New schedule", notes: "New note", mood: "New mood tracker" }[type]);
  const base = { id: uid(), type, category, title: t };
  if (type === "mood") return { ...base, monthStamp: monthKey(), moods: [{ id: uid(), label: "Great", color: "#5A6B4D" }, { id: uid(), label: "Okay", color: "#D9B16A" }, { id: uid(), label: "Low", color: "#6E8597" }, { id: uid(), label: "Hard", color: "#C8783C" }], days: {} };
  if (type === "notes") return { ...base, items: "" };
  if (type === "schedule") return { ...base, items: [{ time: "", t: "" }] };
  return { ...base, items: [{ t: "", done: false }] };
}
function AddBlockMenu({ d, setD, go }) {
  const [open, setOpen] = useState(false);
  const [type, setType] = useState("checklist");
  const [title, setTitle] = useState("");
  const [cat, setCat] = useState("plan");
  const [customCat, setCustomCat] = useState("");
  const cats = getCategories(d);
  const reset = () => { setOpen(false); setType("checklist"); setTitle(""); setCat("plan"); setCustomCat(""); };
  const create = () => {
    const finalCat = (cat === "__new" ? customCat.trim().toLowerCase() : cat) || "plan";
    const b = makeBlock(type, finalCat, title);
    setD({ ...d, blocks: [...d.blocks, b] });
    reset();
    go("plan", "block:" + b.id);

        ))}

      </div>

      <div style={{ display: "flex", gap: 8 }}>

  );

function dayCompletion(d, dt) {
  const k = dayKey(dt), checks = d.habitChecks[k] || {}, oneoffs = d.habitOneoffs[k] || [];
  const doneRec = d.habitDefs.filter((h) => checks[h.id]).length, doneOne = oneoffs.filter((o) => o.done).length;
  const total = d.habitDefs.length + oneoffs.length, done = doneRec + doneOne;
  return { total, done, pct: total ? done / total : 0 };
}
function habitStreaks(d, habitId, now) {
  let current = 0; const cursor = new Date(now);
  if (!(d.habitChecks[dayKey(cursor)] || {})[habitId]) cursor.setDate(cursor.getDate() - 1);
  for (let i = 0; i < 366; i++) { if ((d.habitChecks[dayKey(cursor)] || {})[habitId]) { current++; cursor.setDate(cursor.getDate() - 1); } else break; }
  const dim = daysInMonth(now); let best = 0, run = 0;
  for (let day = 1; day <= dim; day++) { const k = `${now.getFullYear()}-${now.getMonth() + 1}-${day}`; if ((d.habitChecks[k] || {})[habitId]) { run++; if (run > best) best = run; } else run = 0; }
  return { current, best };
}
