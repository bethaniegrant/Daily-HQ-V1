// ─── Cloud sync (Supabase) ────────────────────────────────────────
// Offline-tolerant: writes to localStorage immediately, debounced upload to cloud.
// On first sign-in, any pre-existing local doc is auto-imported.
const SUPABASE_URL = "https://xfocdxswghrvpflbjcos.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhmb2NkeHN3Z2hydnBmbGJqY29zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk0MDgsImV4cCI6MjA5NjY4NTQwOH0.L9FW9JHRtVEOmQw8ceAHkWTzcJPD6lpIihOwF3kXoV8";
const LEGACY_KEY = "wlp_doc";

function useCloudSync(d, setD) {
  const [ready, setReady] = useState(false);
  const [displayName, setDisplayName] = useState("");
  const ctx = useRef({ client: null, userId: null, lkey: null, loadedVersion: 0, rowExists: false });
  const skipNextSave = useRef(true);
  const bootedRef = useRef(false);
  const dRef = useRef(d);
  useEffect(() => { dRef.current = d; }, [d]);

  // Conditional save with optimistic concurrency. Returns true on success.
  // On version conflict: refetch, shallow-overlay in-flight edit on server doc, retry once.
  async function saveWithOCC(doc, updated_at, attempt = 0) {
    const { client, userId, rowExists } = ctx.current;
    if (!client || !userId) return false;

    // First-time insert path (no row yet): plain upsert with version: 1.
    if (!rowExists) {
      const nextDoc = { ...doc, version: 1 };
      const { error } = await client.from("user_data")
        .upsert({ user_id: userId, key: "planner", value: nextDoc, updated_at });
      if (error) { console.warn("cloud insert failed", error); return false; }
      ctx.current.rowExists = true;
      ctx.current.loadedVersion = 1;
      try { localStorage.setItem(ctx.current.lkey, JSON.stringify({ value: nextDoc, updated_at, version: 1 })); } catch {}
      return true;
    }

    const expected = ctx.current.loadedVersion | 0;
    const nextDoc = { ...doc, version: expected + 1 };
    const { data, error } = await client.from("user_data")
      .update({ value: nextDoc, updated_at })
      .eq("user_id", userId).eq("key", "planner")
      .eq("value->>version", String(expected))
      .select("value");

    if (error) { console.warn("cloud save failed", error); return false; }

    if (data && data.length === 1) {
      ctx.current.loadedVersion = nextDoc.version;
      try { localStorage.setItem(ctx.current.lkey, JSON.stringify({ value: nextDoc, updated_at, version: nextDoc.version })); } catch {}
      return true;
    }

    // Conflict: another device wrote since we loaded. Refetch + shallow-overlay.
    if (attempt >= 2) { console.warn("OCC: giving up after repeated conflicts"); return false; }
    try {
      const { data: row } = await client.from("user_data")
        .select("value").eq("user_id", userId).eq("key", "planner").maybeSingle();
      const serverDoc = (row && row.value) || {};
      const serverVersion = (serverDoc.version | 0) || 0;
      const localDoc = dRef.current || {};
      // Shallow top-level overlay: keep server keys we didn't touch, prefer local edits for keys we did.
      const merged = { ...serverDoc, ...localDoc, version: serverVersion };
      ctx.current.loadedVersion = serverVersion;
      skipNextSave.current = true;
      setD(merged);
      dRef.current = merged;
      // Retry with the freshly-merged doc against the new server version.
      return await saveWithOCC(merged, new Date().toISOString(), attempt + 1);
    } catch (e) {
      console.warn("OCC: refetch failed", e);
      return false;
    }
  }

  useEffect(() => {
    if (bootedRef.current) return;
    bootedRef.current = true;
    (async () => {
      try {
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
          auth: { persistSession: false, autoRefreshToken: true },
        });
        ctx.current.client = client;

        const hash = new URLSearchParams(window.location.hash.slice(1));
        const at = hash.get("at"), rt = hash.get("rt");
        if (at && rt) {
          await client.auth.setSession({ access_token: at, refresh_token: rt });
          history.replaceState(null, "", window.location.pathname);
        }
        const { data: { user } } = await client.auth.getUser();
        if (!user) { setReady(true); return; }
        ctx.current.userId = user.id;
        ctx.current.lkey = "wlp_doc_" + user.id;

        try {
          const { data: profile } = await client.from("profiles").select("display_name").eq("id", user.id).maybeSingle();
          setDisplayName(profile?.display_name || user.user_metadata?.display_name || user.user_metadata?.full_name || (user.email ? user.email.split("@")[0] : ""));
        } catch {}


        let local = null;
        try { local = JSON.parse(localStorage.getItem(ctx.current.lkey) || "null"); } catch {}

        let cloud = null;
        try {
          const { data } = await client.from("user_data")
            .select("value, updated_at").eq("key", "planner").maybeSingle();
          cloud = data;
        } catch (e) { console.warn("cloud read failed (offline?)", e); }

        let chosen = null;
        let chosenLocalWins = false;
        if (cloud && local) {
          const cT = +new Date(cloud.updated_at), lT = +new Date(local.updated_at || 0);
          chosen = lT > cT ? local.value : cloud.value;
          chosenLocalWins = lT > cT;
          ctx.current.rowExists = true;
          ctx.current.loadedVersion = (cloud.value && (cloud.value.version | 0)) || 0;
        } else if (cloud) {
          chosen = cloud.value;
          ctx.current.rowExists = true;
          ctx.current.loadedVersion = (cloud.value && (cloud.value.version | 0)) || 0;
        } else if (local) {
          chosen = local.value;
          ctx.current.rowExists = false;
          ctx.current.loadedVersion = 0;
        } else {
          // first-time login: pull any legacy pre-auth local data
          try {
            const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || "null");
            if (legacy && legacy.value) {
              chosen = legacy.value;
              ctx.current.rowExists = false;
              ctx.current.loadedVersion = 0;
              localStorage.removeItem(LEGACY_KEY);
            }
          } catch {}
        }

        if (chosen && typeof chosen === "object") {
          skipNextSave.current = true;
          setD(chosen);
          dRef.current = chosen;
        }

        // If local was newer than cloud, or we only had local/legacy, push it through OCC now.
        if (chosen && (chosenLocalWins || !cloud)) {
          saveWithOCC(chosen, new Date().toISOString());
        }
      } catch (e) {
        console.warn("sync init failed", e);
      } finally {
        setReady(true);
      }
    })();
  }, []);

  // persist on every change: local immediately, cloud debounced
  useEffect(() => {
    if (!ready) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    const { client, userId, lkey, loadedVersion } = ctx.current;
    const updated_at = new Date().toISOString();
    const cachedVersion = (d && (d.version | 0)) || loadedVersion || 0;
    if (lkey) {
      try { localStorage.setItem(lkey, JSON.stringify({ value: d, updated_at, version: cachedVersion })); } catch {}
    } else {
      try { localStorage.setItem(LEGACY_KEY, JSON.stringify({ value: d, updated_at })); } catch {}
    }
    if (!client || !userId) return;
    const t = setTimeout(() => { saveWithOCC(d, updated_at); }, 800);
    return () => clearTimeout(t);
  }, [d, ready]);

  return { ready, displayName, ctx };
}

// Build a custom theme from a small {accent, surface} pair, layered on top of sage.
function buildCustomTheme(custom) {
  const base = THEMES.sage;
  const c = custom || {};
  return { ...base, label: "Custom", desc: "Your colors",
    AMBER: c.AMBER || base.AMBER, MIST: c.MIST || base.MIST,
    SAGE: c.AMBER || base.SAGE, SAGEHI: c.AMBER || base.SAGEHI };
}
function resolveTheme(name, customDoc) {
  if (name === "custom") return buildCustomTheme(customDoc);
  return THEMES[name] || THEMES.sage;
}
function applyTheme(name, customDoc) {
  const t = resolveTheme(name, customDoc);
  INK = t.INK; TEXT = t.TEXT; PAPER = t.PAPER; CARD = t.CARD;
  SAGE = t.SAGE; SAGEHI = t.SAGEHI; LINE = t.LINE;
  MUTED = t.MUTED; AMBER = t.AMBER; MIST = t.MIST;
  BLUE = t.BLUE; PLUM = t.PLUM;
}

function useIsDesktop() {
  const [is, setIs] = useState(typeof window !== "undefined" && window.matchMedia("(min-width: 900px)").matches);
  useEffect(() => {
    const mq = window.matchMedia("(min-width: 900px)");
    const fn = (e) => setIs(e.matches);
    mq.addEventListener ? mq.addEventListener("change", fn) : mq.addListener(fn);
    return () => { mq.removeEventListener ? mq.removeEventListener("change", fn) : mq.removeListener(fn); };
  }, []);
  return is;
}

    applyTheme(d.theme || "sage", d.customTheme);
    setThemeVersion((v) => v + 1);
  }, [d.theme, d.customTheme]);

  // Existing-user migration: if their doc has data but no onboarded flag, mark them done.
  useEffect(() => {
    if (!synced) return;
    if (d.onboarded === true) return;
    const hasData = (d.blocks && d.blocks.length > 0)
      || (d.meds && d.meds.length > 0)
      || (d.habitDefs && d.habitDefs.length > 0)
      || (d.workouts && d.workouts.length > 0)
      || (d.pay && String(d.pay).trim() !== "")
      || ((d.intention || "").trim() !== "" && (d.intention || "").trim() !== "Steady" ? true : false);
    if (hasData) {
      setD((p) => ({
        ...p,
        onboarded: true,
        username: p.username || displayName || "",
        theme: p.theme || "sage",
        focusAreas: p.focusAreas || [],
        dashboardDefault: p.dashboardDefault || "day",
        notTodayIntroSeen: p.notTodayIntroSeen !== false,
        enabledCategories: { money: true, health: true, plan: true, trackers: true, ...(p.enabledCategories || {}) },
        timeBlockingEnabled: p.timeBlockingEnabled === true,
        timeBlocks: p.timeBlocks || {},
      }));
    }
  }, [synced, displayName]); // eslint-disable-line

  // monthly reset: wipe habit checks, one-offs, med checks, workout logs, mood grids
  useEffect(() => {
    if (!synced) return;
    const cur = monthKey(now);
    if (d.monthStamp !== cur) {
      setD((p) => ({ ...p, monthStamp: cur, habitChecks: {}, habitOneoffs: {}, medChecks: {}, workoutDone: {},
        blocks: p.blocks.map((b) => b.type === "mood" ? { ...b, monthStamp: cur, days: {} } : b) }));
    }
  }, [now, synced]); // eslint-disable-line

  // one-time migration: rename legacy "Errands" checklist block → "To Do"
  useEffect(() => {
    if (!synced) return;
    const needs = (d.blocks || []).some((b) => b.type === "checklist" && (b.title || "").trim().toLowerCase() === "errands");
    if (!needs) return;
    setD((p) => ({ ...p, blocks: p.blocks.map((b) => (b.type === "checklist" && (b.title || "").trim().toLowerCase() === "errands") ? { ...b, title: "To Do" } : b) }));
  }, [synced]); // eslint-disable-line

  // one-time migration: mood blocks belong in Health
  useEffect(() => {
    if (!synced) return;
    const needs = (d.blocks || []).some((b) => b.type === "mood" && (b.category || "plan") !== "health");
    if (!needs) return;
    setD((p) => ({ ...p, blocks: p.blocks.map((b) => b.type === "mood" ? { ...b, category: "health" } : b) }));
  }, [synced]); // eslint-disable-line

  // daily rollover: unchecked To Do items carry forward to the next day; checked items are cleared.
  useEffect(() => {
    if (!synced) return;
    const today = dayKey(now);
    if (d.todoDayStamp === today) return;
    setD((p) => ({
      ...p,
      todoDayStamp: today,
      blocks: (p.blocks || []).map((b) =>
        b.type === "checklist" && /to ?do/i.test(b.title || "")
          ? { ...b, items: (b.items || []).filter((it) => !it.done) }
          : b
      ),
    }));
  }, [now, synced]); // eslint-disable-line

  const go = (tabId, pageId = null) => { setTab(tabId); setPage(pageId); };

  // listen for parent (app shell) messages — Home, admin context, etc.
  useEffect(() => {
    const handler = (e) => {
      const m = e && e.data;
      if (!m || typeof m !== "object") return;
      if (m.type === "go") { setTab(m.tab || "home"); setPage(m.page || null); }
      else if (m.type === "shell:context") { setIsAdmin(!!m.isAdmin); }
    };
    window.addEventListener("message", handler);
    try { window.parent && window.parent.postMessage({ type: "shell:ready" }, "*"); } catch (_) {}
    return () => window.removeEventListener("message", handler);
  }, []);

  const signOutFromShell = () => { try { window.parent && window.parent.postMessage({ type: "shell:signOut" }, "*"); } catch (_) {} };
  const openAdmin = () => { try { window.parent && window.parent.postMessage({ type: "shell:navigate", to: "/admin" }, "*"); } catch (_) {} };

  const common = { d, setD, now, go, back: () => { if (page) setPage(null); else go("home"); }, openMenu: () => setMenuOpen(true), isDesktop, displayName };

  // resolve current page
  let view;
  if (page === null) {
    view = { home: <Home {...common} />, money: <Budget {...common} back={() => go("home")} />, health: <HealthHub {...common} />, plan: <PlanHub {...common} />, spaces: <SpacesHub {...common} />, more: <MoreHub {...common} /> }[tab];
  } else if (page.startsWith("block:")) {
    const b = d.blocks.find((x) => x.id === page.split(":")[1]);
    view = b ? (b.type === "mood" ? <MoodEditor block={b} {...common} /> : b.type === "tracker" ? <TrackerEditor block={b} {...common} /> : b.type === "events" ? <EventsEditor block={b} {...common} /> : <BlockEditor block={b} {...common} />) : <PlanHub {...common} />;
  } else if (page.startsWith("workout:")) {
    const w = d.workouts.find((x) => x.id === page.split(":")[1]);
    view = w ? <WorkoutEditor workout={w} {...common} /> : <HealthHub {...common} />;
  } else {
    view = { budget: <Budget {...common} />, habits: <Habits {...common} />, goals: <Goals {...common} />, yearly: <YearlyGoals {...common} />, meals: <Meals {...common} />, meds: <Meds {...common} />, workouts: <Workouts {...common} /> }[page] || <Home {...common} />;
  }

  const closeMenu = () => setMenuOpen(false);
  const navGo = (t, p = null) => { go(t, p); closeMenu(); };
  const moodBlock = d.blocks.find((b) => b.type === "mood");
  const builtinTabs = ["money", "health", "plan", "more"];
  const tabForCat = (c) => (builtinTabs.includes(c) ? c : "plan");
  const blocksFor = (c) => d.blocks.filter((b) => (b.category || "plan") === c).map((b) => ({ icon: GridIcon, color: MIST, title: b.title || "Untitled space", onClick: () => navGo(tabForCat(b.category || "plan"), "block:" + b.id) }));
  const builtin = ["money", "health", "plan", "more"];
  const customCats = [...new Set(d.blocks.map((b) => b.category || "plan").filter((c) => !builtin.includes(c)))];

  const enabledCats = d.enabledCategories || { money: true, health: true, plan: true, trackers: true };
  const MENU_GROUPS = [
    { label: "", items: [{ icon: HomeIcon, color: SAGE, title: "Home", onClick: () => navGo("home") }] },
    ...(enabledCats.money ? [{ label: "Money", items: [
      { icon: WalletIcon, color: AMBER, title: "Budget", onClick: () => navGo("money", "budget") },
      ...blocksFor("money"),
    ]}] : []),
    ...(enabledCats.health ? [{ label: "Health", items: [
      { icon: PillIcon, color: PLUM, title: "Medications", onClick: () => navGo("health", "meds") },
      { icon: DumbbellIcon, color: BLUE, title: "Workouts", onClick: () => navGo("health", "workouts") },
      { icon: PlateIcon, color: SAGE, title: "Meal Plan", onClick: () => navGo("health", "meals") },
      { icon: HeartIcon, color: PLUM, title: "Mood", onClick: () => navGo("health", moodBlock ? "block:" + moodBlock.id : null) },
      ...blocksFor("health").filter((it) => !moodBlock || it.title !== moodBlock.title),
    ]}] : []),
    ...(enabledCats.plan ? [{ label: "Plan", items: [
      { icon: LeafIcon, color: SAGE, title: "Habits", onClick: () => navGo("plan", "habits") },
      { icon: StarIcon, color: AMBER, title: "Monthly Goals", onClick: () => navGo("plan", "goals") },
      { icon: StarIcon, color: AMBER, title: "Yearly Goals", onClick: () => navGo("plan", "yearly") },
      ...blocksFor("plan"),
    ]}] : []),
    { label: "More", items: [
      { icon: GridIcon, color: SAGE, title: "Add a space", onClick: () => navGo("spaces") },
      { icon: GridIcon, color: AMBER, title: "Add more categories", onClick: () => { closeMenu(); setAddCatsOpen(true); } },
      ...blocksFor("more"),
    ]},
    ...customCats.map((c) => ({ label: c.charAt(0).toUpperCase() + c.slice(1), items: blocksFor(c) })),
    { label: "Account", items: [
      ...(isAdmin ? [{ icon: GridIcon, color: BLUE, title: "Admin", onClick: () => { closeMenu(); openAdmin(); } }] : []),
      { icon: GridIcon, color: SAGE, title: "Account settings", onClick: () => { closeMenu(); setAccountOpen(true); } },
      { icon: GridIcon, color: SAGE, title: "Main website", onClick: () => { closeMenu(); try { window.parent && window.parent.postMessage({ type: "shell:navigate", to: "/" }, "*"); } catch (_) {} } },
      { icon: XIcon, color: PLUM, title: "Sign out", onClick: () => { closeMenu(); signOutFromShell(); } },
    ]},
  ];

  return (
    <div style={{ minHeight: "100vh", background: PAPER, display: "flex", justifyContent: "center", fontFamily: "'Outfit', -apple-system, sans-serif", color: TEXT }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; }
        input,textarea{font-family:inherit;}
        .pop{transition:transform .12s ease;cursor:pointer;}.pop:active{transform:scale(.96);}
        .fade{animation:f .35s cubic-bezier(.2,.8,.2,1);}@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        .stagger>*{animation:f .5s cubic-bezier(.2,.8,.2,1) backwards;}
        .stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.09s}
        .stagger>*:nth-child(3){animation-delay:.14s}.stagger>*:nth-child(4){animation-delay:.19s}.stagger>*:nth-child(5){animation-delay:.24s}
        input:focus,textarea:focus{outline:none;}
        .drawer{transition:transform .28s cubic-bezier(.2,.8,.2,1);}
        .backdrop{transition:opacity .28s ease;}
      `}</style>

      <div style={{ width: "100%", maxWidth: isDesktop ? 1180 : 440, minHeight: "100vh", background: PAPER, position: "relative" }}>
        {view}

        {/* top-left controls: menu (always when not home) + back (when on a sub-page) */}
        {!(tab === "home" && page === null) && (
          <div style={{ position: "fixed", top: "max(14px, env(safe-area-inset-top))", left: 14, zIndex: 60, display: "flex", gap: 8 }}>
            <button
              onClick={() => setMenuOpen(true)}
              aria-label="Open menu"
              style={{ width: 44, height: 44, borderRadius: 999, background: "rgba(22,32,28,.85)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(22,32,28,.4)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.2" strokeLinecap="round">
                <line x1="4" y1="7" x2="20" y2="7" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="17" x2="20" y2="17" />
              </svg>
            </button>
            <button
              onClick={() => { if (page) setPage(null); else go("home"); }}
              aria-label="Back"
              style={{ width: 44, height: 44, borderRadius: 999, background: "rgba(22,32,28,.85)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(22,32,28,.4)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 6l-6 6 6 6" />
              </svg>
            </button>
          </div>
        )}

        {/* Floating Dashboard button (bottom-right) — back to home; hidden on home */}
        {!(tab === "home" && page === null) && (
          <button
            onClick={() => go("home")}
            aria-label="Go to dashboard"
            title="Dashboard"
            style={{ position: "fixed", bottom: "max(18px, env(safe-area-inset-bottom))", right: 18, zIndex: 60, width: 52, height: 52, borderRadius: 999, background: INK, color: PAPER, border: `2px solid ${AMBER}`, boxShadow: "0 12px 28px -10px rgba(22,32,28,.55)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 11l9-8 9 8" /><path d="M5 10v10h14V10" />
            </svg>
          </button>
        )}

        {/* backdrop */}
        <div
          className="backdrop"
          onClick={closeMenu}
          style={{ position: "fixed", inset: 0, background: "rgba(22,32,28,.5)", zIndex: 70, opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? "auto" : "none" }}
        />

        {/* drawer */}
        <div
          className="drawer"
          style={{ position: "fixed", top: 0, left: 0, height: "100vh", width: "min(86vw, 320px)", background: PAPER, zIndex: 80, transform: menuOpen ? "translateX(0)" : "translateX(-100%)", boxShadow: menuOpen ? "10px 0 40px -10px rgba(22,32,28,.4)" : "none", display: "flex", flexDirection: "column", overflowY: "auto" }}
        >
          <div style={{ background: INK, color: PAPER, padding: "max(22px, env(safe-area-inset-top)) 22px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, fontWeight: 600, lineHeight: 1 }}>Whole Life</div>
              <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MIST, fontWeight: 700, marginTop: 6 }}>Menu</div>
            </div>
            <button onClick={closeMenu} aria-label="Close menu" style={{ width: 36, height: 36, borderRadius: 999, background: "rgba(244,241,234,.12)", border: "1px solid rgba(244,241,234,.25)", color: PAPER, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.4" strokeLinecap="round"><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></svg>
            </button>
          </div>
          <div style={{ padding: "10px 10px 24px" }}>
            {MENU_GROUPS.map((g, gi) => (
              <div key={gi} style={{ marginTop: g.label ? 14 : 4 }}>
                {g.label && <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED, fontWeight: 700, padding: "0 12px 6px" }}>{g.label}</div>}
                {g.items.map((it, ii) => (
                  <button key={ii} onClick={it.onClick} className="pop" style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: "none", border: "none", textAlign: "left", borderRadius: 6, color: TEXT, fontSize: 15, fontWeight: 600 }}>
                    <span style={{ width: 32, height: 32, borderRadius: 6, background: it.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <it.icon c={PAPER} s={16} />
                    </span>
                    <span>{it.title}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>

      {appearanceOpen && (
        <AppearanceModal d={d} setD={setD} onClose={() => setAppearanceOpen(false)} />
      )}
      {accountOpen && (
        <AccountSettingsModal d={d} setD={setD} ctx={ctx} onClose={() => setAccountOpen(false)} onOpenAppearance={() => { setAccountOpen(false); setAppearanceOpen(true); }} />
      )}
      {addCatsOpen && (
        <AddCategoriesModal d={d} setD={setD} onClose={() => setAddCatsOpen(false)} />
      )}
      {synced && d.onboarded !== true && (
        <Onboarding initialName={displayName} onFinish={(payload) => {
          setD((p) => {
            const base = {
              ...p,
              onboarded: true,
              username: payload.username || "",
              theme: payload.theme || "sage",
              customTheme: payload.customTheme || null,
              focusAreas: payload.focusAreas || [],
              dashboardDefault: payload.dashboardDefault || "day",
              notTodayIntroSeen: true,
              timezone: payload.timezone || p.timezone || "",
            };
            const seeded = applyCategorySeeds(base, payload.categories);
            // Optional first task from step 5
            if (payload.firstTask && payload.firstTask.trim()) {
              const blocks = seeded.blocks || [];
              let todoIdx = blocks.findIndex((b) => b.type === "checklist" && /to ?do/i.test(b.title || ""));
              const today = dayKey(new Date());
              const newItem = { t: payload.firstTask.trim(), done: false, date: today };
              if (todoIdx >= 0) {
                seeded.blocks = blocks.map((b, i) => i === todoIdx ? { ...b, items: [newItem, ...(b.items || [])] } : b);
              } else {
                seeded.blocks = [...blocks, { id: uid(), type: "checklist", category: "plan", title: "To Do", items: [newItem] }];
              }
            }
            return seeded;
          });
        }} />
      )}
    </div>
  );
}

// ═══ ONBOARDING ═══════════════════════════════════════════════════
const SPACE_PRESETS = [
  { id: "money",    label: "Money",    blurb: "Budget, bills, savings, debt",            includes: ["Budget", "Bills", "Savings goals", "Debt"] },
  { id: "health",   label: "Health",   blurb: "Daily care + meals",                       includes: ["Medications", "Workouts", "Meal plan", "Mood"] },
  { id: "plan",     label: "Plan",     blurb: "Habits, to-do, goals, intention",          includes: ["Habits", "To Do", "Monthly goals", "Yearly goals"] },
  { id: "trackers", label: "Trackers", blurb: "Custom logs for anything you care about",  includes: ["Books", "Sleep", "Journal", "Ratings"] },
];

// 6 focus areas shown in step 2. mapsTo collapses to existing category seeds.
const FOCUS_AREAS = [
  { id: "selfcare",  label: "Self-Care",       blurb: "Meds, mood, workouts, meals", mapsTo: "health" },
  { id: "budget",    label: "Budget / Finances", blurb: "Bills, spending, savings",   mapsTo: "money" },
  { id: "work",      label: "Work Tasks",      blurb: "To-do list for your day",     mapsTo: "plan" },
  { id: "habits",    label: "Habit Tracking",  blurb: "Daily check-ins",             mapsTo: "plan" },
  { id: "dates",     label: "Important Dates", blurb: "Events on your calendar",     mapsTo: "plan" },
  { id: "trackers",  label: "Trackers",        blurb: "Books, sleep, journal, more", mapsTo: "trackers" },
];

function Onboarding({ initialName, onFinish }) {
  const [step, setStep] = useState(0);
  const [username, setUsername] = useState((initialName || "").split(" ")[0] || "");
  const [theme, setTheme] = useState("sage");
  const [customTheme, setCustomTheme] = useState({ AMBER: "#C4717A", MIST: "#B8C8D8" });
  const [focusIds, setFocusIds] = useState([]);
  const [dashboardDefault, setDashboardDefault] = useState("day");
  const [firstTask, setFirstTask] = useState("");
  const [timezone, setTimezone] = useState(
    (typeof Intl !== "undefined" && Intl.DateTimeFormat) ? Intl.DateTimeFormat().resolvedOptions().timeZone : "UTC"
  );
  const totalSteps = 6;

  const toggleFocus = (id) => setFocusIds((arr) => arr.includes(id) ? arr.filter((x) => x !== id) : [...arr, id]);
  const categories = (() => {
    const c = { money: false, health: false, plan: false, trackers: false };
    focusIds.forEach((id) => { const f = FOCUS_AREAS.find((x) => x.id === id); if (f) c[f.mapsTo] = true; });
    return c;
  })();

  // step validations
  const canNext = (
    step === 0 ? true :
    step === 1 ? focusIds.length > 0 :
    step === 2 ? !!dashboardDefault :
    step === 3 ? true :
    step === 4 ? true :
    step === 5 ? username.trim().length > 0 :
    true
  );

  const tzOptions = (() => {
    try { if (Intl.supportedValuesOf) return Intl.supportedValuesOf("timeZone"); } catch (_) {}
    return [timezone, "UTC", "America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "Europe/London", "Europe/Paris", "Asia/Tokyo"];
  })();

  const finish = (skipAll) => {
    onFinish({
      username: username.trim() || "Friend",
      theme: skipAll ? "sage" : theme,
      customTheme: !skipAll && theme === "custom" ? customTheme : null,
      categories: skipAll ? { money: true, health: true, plan: true, trackers: true } : categories,
      focusAreas: skipAll ? FOCUS_AREAS.map((f) => f.id) : focusIds,
      dashboardDefault: skipAll ? "day" : dashboardDefault,
      timezone,
      firstTask: skipAll ? "" : firstTask,
    });
  };

  const next = () => { if (step < totalSteps - 1) setStep(step + 1); else finish(false); };
  const back = () => step > 0 && setStep(step - 1);

  const stepTitles = ["Welcome to Daily HQ.", "What's most important right now?", "Choose your dashboard view.", "The \u2018Not Today\u2019 permission.", "Let's create your first task.", "Almost there."];

  // Live preview of theme tokens during step 3
  const previewT = resolveTheme(theme, customTheme);

  const sectionLabel = { fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase", fontWeight: 700, color: MUTED, marginBottom: 8 };
  const cardBtn = (active) => ({
    padding: "14px 16px", background: CARD,
    border: `2px solid ${active ? AMBER : LINE}`, borderRadius: 14,
    cursor: "pointer", textAlign: "left", width: "100%",
  });

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, background: PAPER, overflow: "auto", fontFamily: "'Outfit', -apple-system, sans-serif", color: TEXT }}>
      <div style={{ maxWidth: 580, margin: "0 auto", padding: "max(28px, env(safe-area-inset-top)) 22px 40px", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
        {/* Progress dots */}
        <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 24 }}>
          {Array.from({ length: totalSteps }, (_, i) => (
            <span key={i} style={{ width: i === step ? 26 : 8, height: 8, borderRadius: 999, background: i <= step ? AMBER : LINE, transition: "all .2s" }} />
          ))}
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: MUTED, fontWeight: 700 }}>Step {step + 1} of {totalSteps}</div>
          <h1 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 34, fontWeight: 600, lineHeight: 1.15, letterSpacing: "-.02em", margin: "6px 0 6px", color: TEXT }}>{stepTitles[step]}</h1>
        </div>

        <div style={{ flex: 1 }}>
          {/* STEP 1 — Welcome */}
          {step === 0 && (
            <div>
              <p style={{ fontSize: 16, color: TEXT, lineHeight: 1.6, margin: "0 0 14px" }}>
                You're in the right place. We're here to help you manage your life without the noise.
              </p>
              <p style={{ fontSize: 16, color: MUTED, lineHeight: 1.6, margin: "0 0 14px" }}>
                This is your calm hub &mdash; designed for reality, not just productivity. Let's get you set up, simply.
              </p>
            </div>
          )}

          {/* STEP 2 — Focus areas */}
          {step === 1 && (
            <div>
              <p style={{ fontSize: 15, color: MUTED, lineHeight: 1.5, margin: "0 0 18px" }}>
                Select your core focus areas. You can change these anytime in settings. <strong style={{ color: TEXT }}>Pick at least one.</strong>
              </p>
              <div style={{ display: "grid", gap: 10 }}>
                {FOCUS_AREAS.map((f) => {
                  const active = focusIds.includes(f.id);
                  return (
                    <button key={f.id} onClick={() => toggleFocus(f.id)} className="pop" style={{ ...cardBtn(active), display: "flex", gap: 12, alignItems: "center" }}>
                      <span style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${active ? AMBER : LINE}`, background: active ? AMBER : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {active && <CheckIcon c="#fff" s={12} />}
                      </span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 17, color: TEXT }}>{f.label}</div>
                        <div style={{ fontSize: 13, color: MUTED }}>{f.blurb}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* STEP 3 — Dashboard layout */}
          {step === 2 && (
            <div>
              <p style={{ fontSize: 15, color: MUTED, lineHeight: 1.5, margin: "0 0 18px" }}>What do you want to see first when you log in?</p>
              <div style={{ display: "grid", gap: 10 }}>
                {[
                  { id: "day", label: "Day at a glance", desc: "Today's tasks, meds, events, and bills front and center." },
                  { id: "week", label: "Week at a glance", desc: "The full seven days, with quick-add on every day." },
                ].map((opt) => {
                  const active = dashboardDefault === opt.id;
                  return (
                    <button key={opt.id} onClick={() => setDashboardDefault(opt.id)} className="pop" style={{ ...cardBtn(active), display: "flex", gap: 12, alignItems: "center" }}>
                      <span style={{ width: 22, height: 22, borderRadius: 999, border: `2px solid ${active ? AMBER : LINE}`, background: active ? AMBER : "transparent", flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 17, color: TEXT }}>{opt.label}</div>
                        <div style={{ fontSize: 13, color: MUTED }}>{opt.desc}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* STEP 4 — Not Today permission */}
          {step === 3 && (
            <div>
              <p style={{ fontSize: 16, color: TEXT, lineHeight: 1.6, margin: "0 0 14px" }}>
                Life doesn't always go to plan. If you fall behind or have a heavy day, use the <strong style={{ color: AMBER }}>'Not Today'</strong> button to clear a task without guilt.
              </p>
              <p style={{ fontSize: 16, color: MUTED, lineHeight: 1.6, margin: "0 0 18px" }}>
                It's built in, because you're human. Tasks moved with 'Not Today' simply slide to tomorrow's list &mdash; no shame, no streak broken.
              </p>
              <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 14, padding: "14px 16px", display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ width: 14, height: 14, borderRadius: 4, border: `2px solid ${AMBER}`, flexShrink: 0 }} />
                <span style={{ flex: 1, fontSize: 14, color: TEXT, fontWeight: 600 }}>Take a walk</span>
                <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", color: AMBER, border: `1px solid ${AMBER}`, padding: "4px 8px", borderRadius: 999 }}>Not today \u2192</span>
              </div>
            </div>
          )}

          {/* STEP 5 — First task */}
          {step === 4 && (
            <div>
              <p style={{ fontSize: 15, color: MUTED, lineHeight: 1.5, margin: "0 0 18px" }}>
                Enter one thing you want to get done today. No pressure, just one. (Optional &mdash; you can skip.)
              </p>
              <label style={sectionLabel}>Your first task</label>
              <input
                value={firstTask}
                onChange={(e) => setFirstTask(e.target.value)}
                placeholder="e.g. Make my bed"
                autoFocus
                style={{ width: "100%", border: `1.5px solid ${LINE}`, borderRadius: 12, background: CARD, padding: "14px 16px", fontSize: 17, color: TEXT, outline: "none" }}
              />
            </div>
          )}

          {/* STEP 6 — Final polish */}
          {step === 5 && (
            <div>
              <p style={{ fontSize: 15, color: MUTED, lineHeight: 1.5, margin: "0 0 22px" }}>
                Quick settings: your name, a color theme, and your timezone.
              </p>

              <label style={sectionLabel}>Name for your dashboard</label>
              <input
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                placeholder="Your first name"
                style={{ width: "100%", border: `1.5px solid ${LINE}`, borderRadius: 12, background: CARD, padding: "12px 14px", fontSize: 16, color: TEXT, outline: "none", marginBottom: 18 }}
              />

              <label style={sectionLabel}>Color theme</label>
              <div style={{ display: "grid", gap: 8, marginBottom: 12 }}>
                {THEME_KEYS.map((k) => {
                  const t = THEMES[k];
                  const active = theme === k;
                  return (
                    <button key={k} onClick={() => setTheme(k)} className="pop" style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: t.CARD, border: `2px solid ${active ? t.AMBER : t.LINE}`, borderRadius: 12, cursor: "pointer", textAlign: "left" }}>
                      <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                        {[t.INK, t.SAGE, t.AMBER, t.MIST].map((c, i) => (
                          <span key={i} style={{ width: 16, height: 26, borderRadius: 3, background: c }} />
                        ))}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 15, color: t.TEXT }}>{t.label}</div>
                      </div>
                      {active && <span style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", fontWeight: 800, color: t.AMBER }}>Selected</span>}
                    </button>
                  );
                })}
                {/* Custom theme tile */}
                <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: previewT.CARD, border: `2px solid ${theme === "custom" ? previewT.AMBER : LINE}`, borderRadius: 12 }}>
                  <button onClick={() => setTheme("custom")} className="pop" style={{ display: "flex", gap: 3, flexShrink: 0, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                    {[previewT.INK, previewT.SAGE, previewT.AMBER, previewT.MIST].map((c, i) => (
                      <span key={i} style={{ width: 16, height: 26, borderRadius: 3, background: c }} />
                    ))}
                  </button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 15, color: previewT.TEXT }}>Custom</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>
                      <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: MUTED }}>
                        Accent <input type="color" value={customTheme.AMBER} onChange={(e) => { setCustomTheme((c) => ({ ...c, AMBER: e.target.value })); setTheme("custom"); }} style={{ width: 26, height: 22, border: "none", padding: 0, background: "none", cursor: "pointer" }} />
                      </label>
                      <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: MUTED }}>
                        Mist <input type="color" value={customTheme.MIST} onChange={(e) => { setCustomTheme((c) => ({ ...c, MIST: e.target.value })); setTheme("custom"); }} style={{ width: 26, height: 22, border: "none", padding: 0, background: "none", cursor: "pointer" }} />
                      </label>
                    </div>
                  </div>
                  {theme === "custom" && <span style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", fontWeight: 800, color: previewT.AMBER }}>Selected</span>}
                </div>
              </div>

              <label style={sectionLabel}>Timezone</label>
              <select value={timezone} onChange={(e) => setTimezone(e.target.value)} style={{ width: "100%", border: `1.5px solid ${LINE}`, borderRadius: 12, background: CARD, padding: "12px 14px", fontSize: 14, color: TEXT, outline: "none" }}>
                {tzOptions.map((tz) => <option key={tz} value={tz}>{tz}</option>)}
              </select>
            </div>
          )}
        </div>

        {/* Footer controls */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 28, gap: 10, flexWrap: "wrap" }}>
          <button onClick={() => finish(true)} className="pop" style={{ background: "none", border: "none", color: MUTED, fontSize: 11, fontWeight: 700, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer", padding: "8px 4px" }}>Skip &mdash; set me up with everything</button>
          <div style={{ display: "flex", gap: 8 }}>
            {step > 0 && (
              <button onClick={back} className="pop" style={{ background: "none", border: `1.5px solid ${LINE}`, color: TEXT, borderRadius: 999, padding: "10px 18px", fontSize: 11, fontWeight: 800, letterSpacing: ".16em", textTransform: "uppercase", cursor: "pointer" }}>Back</button>
            )}
            <button
              onClick={next}
              disabled={!canNext}
              className="pop"
              style={{ background: canNext ? AMBER : LINE, border: "none", color: canNext ? "#fff" : MUTED, borderRadius: 999, padding: "10px 22px", fontSize: 11, fontWeight: 800, letterSpacing: ".16em", textTransform: "uppercase", cursor: canNext ? "pointer" : "not-allowed" }}
            >{
              step === 0 ? "Let's begin \u2192"
              : step === 3 ? "Got it \u2192"
              : step === 4 ? (firstTask.trim() ? "Add task \u2192" : "Skip \u2192")
              : step === totalSteps - 1 ? "Save & Launch"
              : "Next \u2192"
            }</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AccountSettingsModal({ d, setD, ctx, onClose, onOpenAppearance }) {
  const [name, setName] = useState(d.username || "");
  const [savingName, setSavingName] = useState(false);
  const [pw1, setPw1] = useState("");
  const [pw2, setPw2] = useState("");
  const [pwBusy, setPwBusy] = useState(false);
  const [msg, setMsg] = useState(null); // {kind:'ok'|'err', text}
  const flash = (kind, text) => { setMsg({ kind, text }); setTimeout(() => setMsg(null), 3500); };

  const saveName = () => {
    const n = name.trim();
    if (!n) { flash("err", "Display name can't be empty."); return; }
    setSavingName(true);
    setD({ ...d, username: n });
    try { const c = ctx?.current?.client; c && c.auth.updateUser({ data: { display_name: n } }); } catch (_) {}
    setSavingName(false);
    flash("ok", "Display name updated.");
  };

  const changePw = async () => {
    if (pw1.length < 8) { flash("err", "Password must be at least 8 characters."); return; }
    if (pw1 !== pw2) { flash("err", "Passwords don't match."); return; }
    setPwBusy(true);
    try {
      const c = ctx?.current?.client;
      if (!c) throw new Error("Not signed in");
      const { error } = await c.auth.updateUser({ password: pw1 });
      if (error) throw error;
      setPw1(""); setPw2("");
      flash("ok", "Password updated.");
    } catch (e) { flash("err", e?.message || "Could not update password."); }
    setPwBusy(false);
  };

  const resetData = async () => {
    if (!confirm("Reset YOUR planner data and restart onboarding? Other accounts signed in on this device are not affected.")) return;
    try {
      const { client, userId, lkey } = ctx?.current || {};
      if (lkey) { try { localStorage.removeItem(lkey); } catch (_) {} }
      if (client && userId) { try { await client.from("user_data").delete().eq("user_id", userId).eq("key", "planner"); } catch (_) {} }
    } catch (_) {}
    location.reload();
  };

  const deleteAccount = () => {
    if (!confirm("Permanently delete your account and all data? This cannot be undone.")) return;
    if (!confirm("Are you absolutely sure? Type OK on the next prompt to confirm.")) return;
    const v = prompt("Type DELETE to confirm:");
    if (v !== "DELETE") return;
    try { window.parent && window.parent.postMessage({ type: "shell:deleteAccount" }, "*"); } catch (_) {}
  };

  const labelStyle = { fontSize: 10, fontWeight: 800, letterSpacing: ".18em", textTransform: "uppercase", color: MUTED, marginBottom: 6, display: "block" };
  const inputStyle = { width: "100%", border: `1px solid ${LINE}`, background: CARD, color: TEXT, padding: "10px 12px", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none" };
  const sectionStyle = { padding: "16px 0", borderTop: `1px solid ${LINE}` };
  const primaryBtn = { background: INK, color: PAPER, border: "none", borderRadius: 999, padding: "8px 16px", fontSize: 11, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer" };
  const subtleBtn = { background: "transparent", color: TEXT, border: `1px solid ${LINE}`, borderRadius: 999, padding: "8px 16px", fontSize: 11, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer" };
  const dangerBtn = { background: "transparent", color: "#B23A48", border: `1px solid #B23A48`, borderRadius: 999, padding: "8px 16px", fontSize: 11, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer" };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 150, background: "rgba(22,32,28,.55)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: PAPER, borderRadius: 18, maxWidth: 480, width: "100%", padding: 22, maxHeight: "90vh", overflow: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, fontWeight: 600, margin: 0, color: TEXT }}>Account settings</h2>
          <button onClick={onClose} aria-label="Close" style={{ background: "none", border: "none", color: MUTED, fontSize: 24, cursor: "pointer", padding: 0, lineHeight: 1 }}>×</button>
        </div>
        {msg && (
          <div style={{ marginTop: 10, padding: "8px 12px", borderRadius: 8, fontSize: 13, fontWeight: 600, background: msg.kind === "ok" ? SAGE + "22" : "#B23A4822", color: msg.kind === "ok" ? TEXT : "#B23A48" }}>{msg.text}</div>
        )}

        <div style={sectionStyle}>
          <label style={labelStyle}>Display name</label>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={name} onChange={(e) => setName(e.target.value)} style={{ ...inputStyle, flex: 1 }} />
            <button onClick={saveName} disabled={savingName} className="pop" style={primaryBtn}>Save</button>
          </div>
        </div>

        <div style={sectionStyle}>
          <label style={labelStyle}>Appearance</label>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 13, color: MUTED }}>Theme, colors and accent.</div>
            <button onClick={onOpenAppearance} className="pop" style={subtleBtn}>Open</button>
          </div>
        </div>

        <div style={sectionStyle}>
          <label style={labelStyle}>Change password</label>
          <div style={{ display: "grid", gap: 8 }}>
            <input type="password" placeholder="New password" value={pw1} onChange={(e) => setPw1(e.target.value)} style={inputStyle} />
            <input type="password" placeholder="Confirm new password" value={pw2} onChange={(e) => setPw2(e.target.value)} style={inputStyle} />
            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button onClick={changePw} disabled={pwBusy} className="pop" style={primaryBtn}>{pwBusy ? "Updating…" : "Update password"}</button>
            </div>
          </div>
        </div>

        <div style={sectionStyle}>
          <label style={labelStyle}>Reset planner data</label>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 13, color: MUTED }}>Clears your data and restarts onboarding. Account stays active.</div>
            <button onClick={resetData} className="pop" style={subtleBtn}>Reset</button>
          </div>
        </div>

        <div style={{ ...sectionStyle, borderTop: `1px solid #B23A4844` }}>
          <label style={{ ...labelStyle, color: "#B23A48" }}>Danger zone</label>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 13, color: MUTED }}>Permanently delete your account and all data.</div>
            <button onClick={deleteAccount} className="pop" style={dangerBtn}>Delete account</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AddCategoriesModal({ d, setD, onClose }) {
  const cur = d.enabledCategories || {};
  const toggle = (id) => {
    const nextEnabled = { ...cur, [id]: !cur[id] };
    // If turning ON for the first time, seed example data for that category.
    if (!cur[id]) {
      const seeded = applyCategorySeeds({ ...d, enabledCategories: nextEnabled }, { [id]: true });
      setD(seeded);
    } else {
      setD({ ...d, enabledCategories: nextEnabled });
    }
  };
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 150, background: "rgba(22,32,28,.55)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: PAPER, borderRadius: 18, maxWidth: 460, width: "100%", padding: 22, maxHeight: "90vh", overflow: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, fontWeight: 600, margin: 0, color: TEXT }}>Your categories</h2>
          <button onClick={onClose} aria-label="Close" style={{ background: "none", border: "none", color: MUTED, fontSize: 24, cursor: "pointer", padding: 0, lineHeight: 1 }}>×</button>
        </div>
        <p style={{ fontSize: 13, color: MUTED, margin: "0 0 16px" }}>Turn a category on to add it to your menu and dashboard. Turning one off hides it but keeps your data safe.</p>
        <div style={{ display: "grid", gap: 10 }}>
          {SPACE_PRESETS.map((sp) => {
            const active = !!cur[sp.id];
            return (
              <button key={sp.id} onClick={() => toggle(sp.id)} className="pop" style={{ padding: "12px 14px", background: CARD, border: `2px solid ${active ? AMBER : LINE}`, borderRadius: 12, cursor: "pointer", textAlign: "left", display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${active ? AMBER : LINE}`, background: active ? AMBER : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {active && <CheckIcon c="#fff" s={12} />}
                </span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 16, color: TEXT }}>{sp.label}</div>
                  <div style={{ fontSize: 12, color: MUTED }}>{sp.blurb}</div>
                </div>
                <span style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", fontWeight: 800, color: active ? AMBER : MUTED }}>{active ? "On" : "Off"}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Home({ d, setD, now, go, openMenu, isDesktop, displayName }) {
  const cats = d.enabledCategories || { money: true, health: true, plan: true, trackers: true };
  const hour = now.getHours();
  const greet = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
  const comp = dayCompletion(d, now);
  const left = (Number(d.pay) || 0) - budgetSpent(d);
  const medsToday = d.meds.length, medsTaken = d.meds.filter((m) => medFullyTaken((d.medChecks[dayKey(now)] || {})[m.id], medTimes(m))).length;
  const dateLine = now.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

function TrackerCalendar({ d, setD, now, go, isDesktop, selectedDay, onSelectDay }) {
  const [overviewDay, setOverviewDay] = useState(null); // Date or null
  const [weekOpen, setWeekOpen] = useState(false);
  const [cursor, setCursor] = useState(new Date(now.getFullYear(), now.getMonth(), 1));
  const dim = daysInMonth(cursor), pad = firstWeekday(cursor);
  const todayK = dayKey(now);
  const dayShells = ["S", "M", "T", "W", "T", "F", "S"];

  // bills due map: day-of-month -> [{ n, color }] — only real bills (fixed + debt), recurs monthly
  const billsByDay = {};
  const monthLen = daysInMonth(cursor);
  const allBudgetSecs = [...BUDGET_SECTIONS, ...((d.customBudgetSections) || [])]
    .filter((sec) => sec.key === "fixed" || sec.key === "debt");
  allBudgetSecs.forEach((sec) => {
    (d.budget[sec.key] || []).forEach((r) => {
      let day = parseInt(r.due, 10);
      if (!(day >= 1 && day <= 31)) return;
      if (!r.n && !r.a) return;
      if (day > monthLen) day = monthLen; // e.g. due 31 in Feb → last day
      billsByDay[day] = billsByDay[day] || [];
      billsByDay[day].push({ n: r.n || "(unnamed)", color: sec.color, a: r.a, section: sec.label });
    });
  });

  const moodBlock = (d.blocks || []).find((b) => b.type === "mood");

  const sameMonth = cursor.getFullYear() === now.getFullYear() && cursor.getMonth() === now.getMonth();
  const moodById = (id) => moodBlock && moodBlock.moods.find((m) => m.id === id);

  const cellInfo = (day) => {
    const dt = new Date(cursor.getFullYear(), cursor.getMonth(), day);
    const k = dayKey(dt);
    const hc = dayCompletion(d, dt);
    const habitsPct = hc.total ? hc.done / hc.total : 0;
    const medsCount = d.meds.filter((m) => medFullyTaken((d.medChecks[k] || {})[m.id], medTimes(m))).length;
    const medsAll = d.meds.length > 0 && medsCount === d.meds.length;
    const workoutLogged = !!(d.workoutDone && d.workoutDone[k] && Object.keys(d.workoutDone[k]).length);
    const moodId = sameMonth && moodBlock && moodBlock.days ? moodBlock.days[day] : null;
    const mood = moodId ? moodById(moodId) : null;
    const moodLogged = !!mood;
    const bills = billsByDay[day] || [];
    return { dt, k, habitsPct, habitsTotal: hc.total, habitsDone: hc.done, medsCount, medsAll, workoutLogged, moodLogged, mood, bills };
  };


  const prevMonth = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1));

// ─── Day & Week Overview ────────────────────────────────────────
function dayBundle(d, dt) {
  const k = dayKey(dt);
  const dayNum = dt.getDate();
  const sameMonth = dt.getFullYear() === new Date().getFullYear() && dt.getMonth() === new Date().getMonth();
  const checks = d.habitChecks[k] || {};
  const oneoffs = d.habitOneoffs[k] || [];
  const habits = [
    ...d.habitDefs.map((h) => ({ id: h.id, n: h.n, done: !!checks[h.id], recurring: true })),
    ...oneoffs.map((o) => ({ id: o.id, n: o.n, done: !!o.done, recurring: false })),
  ];
  const medsList = d.meds.map((m) => {
    const t = medTimes(m);
    const done = medDoneCount((d.medChecks[k] || {})[m.id], t);
    return { id: m.id, n: m.n, dose: m.dose, done, times: t };
  });
  const workoutDone = d.workoutDone && d.workoutDone[k] ? d.workoutDone[k] : {};
  const workouts = Object.keys(workoutDone).map((wid) => {
    const w = d.workouts.find((x) => x.id === wid);
    if (!w) return null;
    const exDone = workoutDone[wid] || {};
    const doneCount = (w.ex || []).filter((e) => exDone[e.id]).length;
    return { id: wid, n: w.n, cat: catOf(w.cat), done: doneCount, total: (w.ex || []).length };
  }).filter(Boolean);
  const moodBlock = (d.blocks || []).find((b) => b.type === "mood");
  const moodId = sameMonth && moodBlock && moodBlock.days ? moodBlock.days[dayNum] : null;
  const mood = moodId && moodBlock ? moodBlock.moods.find((m) => m.id === moodId) : null;
  const bills = [];
  const monthLen2 = daysInMonth(dt);
  const allBudgetSecs2 = [...BUDGET_SECTIONS, ...((d.customBudgetSections) || [])]
    .filter((sec) => sec.key === "fixed" || sec.key === "debt");
  allBudgetSecs2.forEach((sec) => {
    (d.budget[sec.key] || []).forEach((r) => {
      let day = parseInt(r.due, 10);
      if (!(day >= 1 && day <= 31)) return;
      if (!r.n && !r.a) return;
      if (day > monthLen2) day = monthLen2;
      if (day === dayNum) bills.push({ n: r.n || "(unnamed)", a: r.a, color: sec.color, section: sec.label, recurring: true });
    });
  });
  const weekdayShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()];
  const meal = mealsFor(d.meals && d.meals[weekdayShort]);
  const isToday = k === dayKey(new Date());
  const events = [];
  (d.blocks || []).forEach((bk) => {
    if (bk.type !== "events") return;
    (bk.events || []).forEach((e) => { if (e.date === k) events.push({ ...e, blockId: bk.id }); });
  });
  events.sort((a, b) => (a.start || "").localeCompare(b.start || ""));
  const todoBlock = (d.blocks || []).find((b) => b.type === "checklist" && /to ?do/i.test(b.title || ""));
  const todos = [];
  if (todoBlock) {
    (todoBlock.items || []).forEach((it, idx) => {
      const matchDate = it.date ? it.date === k : isToday;
      if (matchDate) todos.push({ ...it, idx, blockId: todoBlock.id });
    });
  }
  return { habits, medsList, workouts, mood, bills, meal, weekdayShort, events, todos, todoBlockId: todoBlock ? todoBlock.id : null };
}

// Quick-add helper used by the side panel: writes a To Do (with date) or an Event.
function quickAddItem(d, setD, { type, title, date, time }) {
  const t = (title || "").trim();
  if (!t) return;
  if (type === "todo") {
    let blocks = d.blocks || [];
    let todo = blocks.find((b) => b.type === "checklist" && /to ?do/i.test(b.title || ""));
    if (!todo) {
      todo = { id: uid(), type: "checklist", category: "plan", title: "To Do", items: [] };
      blocks = [...blocks, todo];
    }
    setD({
      ...d,
      blocks: blocks.map((b) => b.id === todo.id ? { ...b, items: [...(b.items || []), { t, done: false, date: date || null }] } : b),
    });
  } else {
    let blocks = d.blocks || [];
    let ev = blocks.find((b) => b.type === "events");
    if (!ev) {
      ev = { id: uid(), type: "events", category: "plan", title: "Calendar", events: [], googleSync: { connected: false, lastSyncAt: null, calendarId: "primary" } };
      blocks = [...blocks, ev];
    }
    const newEvent = { id: uid(), title: t, date: date || dayKey(new Date()), allDay: !time, start: time || "", end: "", location: "", notes: "", source: "local", googleId: null, updatedAt: new Date().toISOString() };
    setD({
      ...d,
      blocks: blocks.map((b) => b.id === ev.id ? { ...b, events: [...(b.events || []), newEvent] } : b),
    });
  }
}
