<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#16201C" />
<title>Whole Life Planner</title>
<style>
  html, body { margin: 0; padding: 0; background: #16201C; }
  #root { min-height: 100vh; }
</style>
<!-- React + Babel from CDN so this runs with no build step.
     For production you'd compile this instead of using the in-browser Babel transformer. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;


// ─── Whole Life — Tabbed App ──────────────────────────────────────
// Bottom tab bar: Home · Money · Health · Plan · More
// Each tab is a hub that expands into individual tools.
// New this round: Meds tracker + Workout builder.
// Per-day habits/meds, monthly reset (local tz), streaks, custom spaces.

const INK = "#16201C", PAPER = "#F4F1EA", CARD = "#FFFFFF",
      SAGE = "#5A6B4D", SAGEHI = "#7E9266", LINE = "#E4E0D5",
      MUTED = "#6E6A60", AMBER = "#C8783C", MIST = "#A9B8AE",
      BLUE = "#6E8597", PLUM = "#9C7E96";

const money = (n) => (isNaN(n) || n === "" ? "" : Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }));
const uid = () => Math.random().toString(36).slice(2, 9);
const monthKey = (dt = new Date()) => `${dt.getFullYear()}-${dt.getMonth() + 1}`;
const dayKey = (dt) => `${dt.getFullYear()}-${dt.getMonth() + 1}-${dt.getDate()}`;
const daysInMonth = (dt) => new Date(dt.getFullYear(), dt.getMonth() + 1, 0).getDate();
const firstWeekday = (dt) => new Date(dt.getFullYear(), dt.getMonth(), 1).getDay();

const seed = () => ({
  pay: "",
  budget: {
    fixed: [{ id: uid(), n: "Rent", a: "" }, { id: uid(), n: "Car payment", a: "" }],
    variable: [{ id: uid(), n: "Groceries", a: "" }, { id: uid(), n: "Gas", a: "" }],
    savings: [{ id: uid(), n: "Emergency fund", a: "" }],
    debt: [{ id: uid(), n: "Credit card", a: "" }],
  },
  monthStamp: monthKey(),
  habitDefs: [{ id: uid(), n: "Move my body" }, { id: uid(), n: "Drink water" }, { id: uid(), n: "Read 10 min" }],
  habitChecks: {}, habitOneoffs: {},
  meds: [{ id: uid(), n: "Vitamin D", dose: "1000 IU", when: "Morning" }, { id: uid(), n: "Magnesium", dose: "200 mg", when: "Night" }],
  medChecks: {}, // { dayKey: { medId: true } }
  workouts: [
    { id: uid(), n: "Push day", ex: [{ id: uid(), n: "Bench press", sets: "3", reps: "8", w: "" }, { id: uid(), n: "Shoulder press", sets: "3", reps: "10", w: "" }] },
    { id: uid(), n: "Leg day", ex: [{ id: uid(), n: "Squats", sets: "4", reps: "6", w: "" }] },
  ],
  workoutDone: {}, // { dayKey: { workoutId: { exId: true } } }
  goals: [{ n: "", done: false }, { n: "", done: false }, { n: "", done: false }],
  meals: { Mon: "", Tue: "", Wed: "", Thu: "", Fri: "", Sat: "", Sun: "" },
  shopping: [{ t: "", done: false }],
  intention: "Steady",
  blocks: [
    { id: uid(), type: "checklist", category: "plan", title: "Errands", items: [{ t: "Pharmacy pickup", done: false }, { t: "Mail package", done: true }] },
    { id: uid(), type: "mood", category: "health", title: "Mood", monthStamp: monthKey(), moods: [{ id: uid(), label: "Great", color: "#5A6B4D" }, { id: uid(), label: "Okay", color: "#D9B16A" }, { id: uid(), label: "Low", color: "#6E8597" }, { id: uid(), label: "Hard", color: "#C8783C" }], days: {} },
  ],
});

function App() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);

  const [tab, setTab] = useState("home");     // home | money | health | plan | more
  const [page, setPage] = useState(null);     // null = hub; else tool id (may be "block:<id>" or "workout:<id>")
  const [menuOpen, setMenuOpen] = useState(false);
  const [d, setD] = useState(seed);

  // monthly reset: wipe habit checks, one-offs, med checks, workout logs, mood grids
  useEffect(() => {
    const cur = monthKey(now);
    if (d.monthStamp !== cur) {
      setD((p) => ({ ...p, monthStamp: cur, habitChecks: {}, habitOneoffs: {}, medChecks: {}, workoutDone: {},
        blocks: p.blocks.map((b) => b.type === "mood" ? { ...b, monthStamp: cur, days: {} } : b) }));
    }
  }, [now]); // eslint-disable-line

  const go = (tabId, pageId = null) => { setTab(tabId); setPage(pageId); };
  const common = { d, setD, now, go, back: () => setPage(null) };

  // resolve current page
  let view;
  if (page === null) {
    view = { home: <Home {...common} />, money: <MoneyHub {...common} />, health: <HealthHub {...common} />, plan: <PlanHub {...common} />, more: <MoreHub {...common} /> }[tab];
  } else if (page.startsWith("block:")) {
    const b = d.blocks.find((x) => x.id === page.split(":")[1]);
    view = b ? (b.type === "mood" ? <MoodEditor block={b} {...common} /> : <BlockEditor block={b} {...common} />) : <PlanHub {...common} />;
  } else if (page.startsWith("workout:")) {
    const w = d.workouts.find((x) => x.id === page.split(":")[1]);
    view = w ? <WorkoutEditor workout={w} {...common} /> : <HealthHub {...common} />;
  } else {
    view = { budget: <Budget {...common} />, habits: <Habits {...common} />, goals: <Goals {...common} />, meals: <Meals {...common} />, meds: <Meds {...common} />, workouts: <Workouts {...common} /> }[page] || <Home {...common} />;
  }

  const closeMenu = () => setMenuOpen(false);
  const navGo = (t, p = null) => { go(t, p); closeMenu(); };
  const moodBlock = d.blocks.find((b) => b.type === "mood");
  const blocksFor = (c) => d.blocks.filter((b) => (b.category || "plan") === c).map((b) => ({ icon: GridIcon, color: MIST, title: b.title || "Untitled space", onClick: () => navGo("plan", "block:" + b.id) }));
  const builtin = ["money", "health", "plan", "more"];
  const customCats = [...new Set(d.blocks.map((b) => b.category || "plan").filter((c) => !builtin.includes(c)))];

  const MENU_GROUPS = [
    { label: "", items: [{ icon: HomeIcon, color: SAGE, title: "Home", onClick: () => navGo("home") }] },
    { label: "Money", items: [
      { icon: WalletIcon, color: AMBER, title: "Budget", onClick: () => navGo("money", "budget") },
      ...blocksFor("money"),
    ]},
    { label: "Health", items: [
      { icon: PillIcon, color: PLUM, title: "Medications", onClick: () => navGo("health", "meds") },
      { icon: DumbbellIcon, color: BLUE, title: "Workouts", onClick: () => navGo("health", "workouts") },
      { icon: PlateIcon, color: SAGE, title: "Meal Plan", onClick: () => navGo("health", "meals") },
      { icon: HeartIcon, color: PLUM, title: "Mood", onClick: () => navGo("plan", moodBlock ? "block:" + moodBlock.id : null) },
      ...blocksFor("health").filter((it) => !moodBlock || it.title !== moodBlock.title),
    ]},
    { label: "Plan", items: [
      { icon: LeafIcon, color: SAGE, title: "Habits", onClick: () => navGo("plan", "habits") },
      { icon: StarIcon, color: AMBER, title: "Monthly Goals", onClick: () => navGo("plan", "goals") },
      ...blocksFor("plan"),
    ]},
    { label: "More", items: [
      { icon: GridIcon, color: SAGE, title: "Add a space", onClick: () => navGo("plan") },
      ...blocksFor("more"),
    ]},
    ...customCats.map((c) => ({ label: c.charAt(0).toUpperCase() + c.slice(1), items: blocksFor(c) })),
  ];

  return (
    <div style={{ minHeight: "100vh", background: INK, display: "flex", justifyContent: "center", fontFamily: "'Space Grotesk', -apple-system, sans-serif", color: INK }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; }
        input,textarea{font-family:inherit;}
        .pop{transition:transform .12s ease;cursor:pointer;}.pop:active{transform:scale(.96);}
        .fade{animation:f .35s cubic-bezier(.2,.8,.2,1);}@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        .stagger>*{animation:f .5s cubic-bezier(.2,.8,.2,1) backwards;}
        .stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.09s}
        .stagger>*:nth-child(3){animation-delay:.14s}.stagger>*:nth-child(4){animation-delay:.19s}.stagger>*:nth-child(5){animation-delay:.24s}
        input:focus,textarea:focus{outline:none;}
        .drawer{transition:transform .28s cubic-bezier(.2,.8,.2,1);}
        .backdrop{transition:opacity .28s ease;}
      `}</style>

      <div style={{ width: "100%", maxWidth: 440, minHeight: "100vh", background: PAPER, position: "relative" }}>
        {view}

        {/* hamburger button (top-left, fixed) */}
        <button
          onClick={() => setMenuOpen(true)}
          aria-label="Open menu"
          style={{ position: "fixed", top: "max(14px, env(safe-area-inset-top))", left: 14, zIndex: 60, width: 44, height: 44, borderRadius: 999, background: "rgba(244,241,234,.12)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(244,241,234,.25)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.2" strokeLinecap="round">
            <line x1="4" y1="7" x2="20" y2="7" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="17" x2="20" y2="17" />
          </svg>
        </button>

        {/* backdrop */}
        <div
          className="backdrop"
          onClick={closeMenu}
          style={{ position: "fixed", inset: 0, background: "rgba(22,32,28,.5)", zIndex: 70, opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? "auto" : "none" }}
        />

        {/* drawer */}
        <div
          className="drawer"
          style={{ position: "fixed", top: 0, left: 0, height: "100vh", width: "min(86vw, 320px)", background: PAPER, zIndex: 80, transform: menuOpen ? "translateX(0)" : "translateX(-100%)", boxShadow: menuOpen ? "10px 0 40px -10px rgba(22,32,28,.4)" : "none", display: "flex", flexDirection: "column", overflowY: "auto" }}
        >
          <div style={{ background: INK, color: PAPER, padding: "max(22px, env(safe-area-inset-top)) 22px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontFamily: "'Fraunces',serif", fontSize: 22, fontWeight: 600, lineHeight: 1 }}>Whole Life</div>
              <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MIST, fontWeight: 700, marginTop: 6 }}>Menu</div>
            </div>
            <button onClick={closeMenu} aria-label="Close menu" style={{ width: 36, height: 36, borderRadius: 999, background: "rgba(244,241,234,.12)", border: "1px solid rgba(244,241,234,.25)", color: PAPER, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={PAPER} strokeWidth="2.4" strokeLinecap="round"><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></svg>
            </button>
          </div>
          <div style={{ padding: "10px 10px 24px" }}>
            {MENU_GROUPS.map((g, gi) => (
              <div key={gi} style={{ marginTop: g.label ? 14 : 4 }}>
                {g.label && <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED, fontWeight: 700, padding: "0 12px 6px" }}>{g.label}</div>}
                {g.items.map((it, ii) => (
                  <button key={ii} onClick={it.onClick} className="pop" style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: "none", border: "none", textAlign: "left", borderRadius: 6, color: INK, fontSize: 15, fontWeight: 600 }}>
                    <span style={{ width: 32, height: 32, borderRadius: 6, background: it.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <it.icon c={PAPER} s={16} />
                    </span>
                    <span>{it.title}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ HOME ═════════════════════════════════════════════════════════
function Home({ d, now, go }) {
  const hour = now.getHours();
  const greet = hour < 12 ? "Morning" : hour < 18 ? "Afternoon" : "Evening";
  const comp = dayCompletion(d, now);
  const left = (Number(d.pay) || 0) - budgetSpent(d);
  const medsToday = d.meds.length, medsTaken = d.meds.filter((m) => (d.medChecks[dayKey(now)] || {})[m.id]).length;

  const tzShort = now.toLocaleTimeString("en-US", { timeZoneName: "short" }).split(" ").pop();
  const dateLine = now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const timeLine = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  return (
    <div className="fade">
      <div style={{ background: INK, color: PAPER, padding: "26px 22px 64px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ border: `1px solid rgba(255,255,255,.25)`, borderRadius: 2, padding: "5px 12px", fontSize: 11, fontWeight: 700, letterSpacing: ".12em", textTransform: "uppercase" }}>{d.intention || "—"}</div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "'Fraunces',serif", fontSize: 17, fontWeight: 600, lineHeight: 1 }}>{dateLine}</div>
            <div style={{ fontSize: 12, color: MIST, fontWeight: 600, marginTop: 3 }}>{timeLine} · {tzShort}</div>
          </div>
        </div>
        <h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 38, fontWeight: 600, lineHeight: 1.0, marginTop: 18, letterSpacing: "-.02em" }}>
          {greet}.<br /><span style={{ color: SAGEHI }}>Let's keep it simple.</span>
        </h1>
      </div>

      <div style={{ padding: "0 18px", marginTop: -44, position: "relative", zIndex: 2 }}>
        <div className="pop" onClick={() => go("plan", "habits")} style={{ background: CARD, borderRadius: 4, padding: "22px 24px", display: "flex", alignItems: "center", gap: 22, boxShadow: "0 20px 40px -16px rgba(22,32,28,.4)", border: `1px solid ${LINE}` }}>
          <Ring pct={comp.pct} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED, fontWeight: 700 }}>Today's habits</div>
            <div style={{ fontFamily: "'Fraunces',serif", fontSize: 30, fontWeight: 600, lineHeight: 1.05, margin: "3px 0" }}>{comp.done}<span style={{ color: MUTED }}> / {comp.total}</span></div>
            <div style={{ fontSize: 13, color: SAGE, fontWeight: 600 }}>{comp.pct === 1 && comp.total ? "Every one. Done." : comp.pct >= .5 ? "Past halfway." : "Begin with one."}</div>
          </div>
        </div>
      </div>

      <SectionLabel text="Jump back in" />
      <div className="stagger" style={{ padding: "0 18px 10px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Tile accent={AMBER} icon={WalletIcon} title="Budget" big={d.pay ? `$${money(left)}` : "Set up"} sub={d.pay ? "left this pay" : "tap to begin"} onClick={() => go("money", "budget")} dark />
        <Tile accent={PLUM} icon={PillIcon} title="Meds" big={medsToday ? `${medsTaken}/${medsToday}` : "Add"} sub={medsToday ? "taken today" : "tap to begin"} onClick={() => go("health", "meds")} />
        <Tile accent={BLUE} icon={DumbbellIcon} title="Workouts" big={`${d.workouts.length}`} sub="plans built" onClick={() => go("health", "workouts")} />
        <Tile accent={SAGE} icon={PlateIcon} title="Meals" big={`${Object.values(d.meals).filter((m) => m.trim()).length}/7`} sub="days planned" onClick={() => go("health", "meals")} dark />
      </div>

      <SectionLabel text="Explore" />
      <div style={{ padding: "0 18px 30px", display: "grid", gap: 10 }}>
        <HubLink icon={WalletIcon} color={AMBER} title="Money" sub="Budget · debt · savings" onClick={() => go("money")} />
        <HubLink icon={HeartIcon} color={PLUM} title="Health" sub="Meds · workouts · meals · mood" onClick={() => go("health")} />
        <HubLink icon={StarIcon} color={SAGE} title="Plan" sub="Habits · goals · your spaces" onClick={() => go("plan")} />
      </div>
    </div>
  );
}

// ═══ HUBS ═════════════════════════════════════════════════════════
function Hub({ title, sub, children }) {
  return (
    <div className="fade">
      <div style={{ background: INK, color: PAPER, padding: "30px 22px 26px" }}>
        <div style={{ fontSize: 12, letterSpacing: ".18em", textTransform: "uppercase", color: MIST, fontWeight: 700 }}>{sub}</div>
        <h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 34, fontWeight: 600, lineHeight: 1, marginTop: 4, letterSpacing: "-.02em" }}>{title}</h1>
      </div>
      <div className="stagger" style={{ padding: "20px 18px 30px", display: "grid", gap: 12 }}>{children}</div>
    </div>
  );
}
function ToolRow({ icon: Icon, color, title, sub, stat, onClick }) {
  return (
    <div className="pop" onClick={onClick} style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${color}`, borderRadius: 4, padding: "17px 18px", display: "flex", alignItems: "center", gap: 15 }}>
      <div style={{ width: 44, height: 44, borderRadius: 4, background: color + "18", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon c={color} s={22} /></div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: "-.01em" }}>{title}</div>
        <div style={{ fontSize: 13, color: MUTED }}>{sub}</div>
      </div>
      {stat && <div style={{ fontFamily: "'Fraunces',serif", fontSize: 18, fontWeight: 600, color }}>{stat}</div>}
      <ChevIcon c={MUTED} />
    </div>
  );
}

function MoneyHub({ d, go }) {
  const left = (Number(d.pay) || 0) - budgetSpent(d);
  return (
    <Hub title="Money" sub="Spend with intention">
      <ToolRow icon={WalletIcon} color={AMBER} title="Budget" sub="Paycheck, savings, debt — all in one" stat={d.pay ? `$${money(left)}` : ""} onClick={() => go("money", "budget")} />

    </Hub>
  );
}
function HealthHub({ d, now, go }) {
  const medsTaken = d.meds.filter((m) => (d.medChecks[dayKey(now)] || {})[m.id]).length;
  return (
    <Hub title="Health" sub="Care for the basics">
      <ToolRow icon={PillIcon} color={PLUM} title="Medications" sub="Track your daily doses" stat={d.meds.length ? `${medsTaken}/${d.meds.length}` : ""} onClick={() => go("health", "meds")} />
      <ToolRow icon={DumbbellIcon} color={BLUE} title="Workouts" sub="Build and log your training" stat={`${d.workouts.length}`} onClick={() => go("health", "workouts")} />
      <ToolRow icon={PlateIcon} color={SAGE} title="Meal Plan" sub="Week of meals + shopping list" stat={`${Object.values(d.meals).filter((m) => m.trim()).length}/7`} onClick={() => go("health", "meals")} />
      <ToolRow icon={HeartIcon} color={"#9C7E96"} title="Mood" sub="Color your month" onClick={() => { const mb = d.blocks.find((b) => b.type === "mood"); go("plan", mb ? "block:" + mb.id : null); }} />
    </Hub>
  );
}
function PlanHub({ d, setD, go }) {
  const goalsSet = d.goals.filter((g) => g.n.trim()).length;
  return (
    <Hub title="Plan" sub="Shape your days">
      <ToolRow icon={LeafIcon} color={SAGE} title="Habits" sub="Daily, with streaks" onClick={() => go("plan", "habits")} />
      <ToolRow icon={StarIcon} color={AMBER} title="Monthly Goals" sub="Three that matter" stat={goalsSet ? `${goalsSet}` : ""} onClick={() => go("plan", "goals")} />
      <SectionMini text="Your spaces" />
      {d.blocks.map((b) => <BlockPreview key={b.id} block={b} onClick={() => go("plan", "block:" + b.id)} now={new Date()} />)}
      <AddBlockMenu d={d} setD={setD} go={go} />
    </Hub>
  );
}
function MoreHub({ d, setD, go }) {
  return (
    <Hub title="More" sub="Settings and extras">
      <Note>This is where account, install help, reminders, themes and backup will live in the full app. For now it's a placeholder.</Note>
      <ToolRow icon={GridIcon} color={SAGE} title="Add a space" sub="Checklist, list, schedule, notes, mood" onClick={() => go("plan")} />
      
    </Hub>
  );
}

function Note({ children }) { return <div style={{ fontSize: 13, color: MUTED, lineHeight: 1.5, fontStyle: "italic", fontFamily: "'Fraunces',serif", padding: "4px 2px" }}>{children}</div>; }
function SectionMini({ text }) { return <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED, fontWeight: 700, marginTop: 8 }}>{text}</div>; }
function HubLink({ icon: Icon, color, title, sub, onClick }) {
  return (
    <div className="pop" onClick={onClick} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "16px 18px", display: "flex", alignItems: "center", gap: 14 }}>
      <div style={{ width: 40, height: 40, borderRadius: 4, background: color + "18", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon c={color} s={21} /></div>
      <div style={{ flex: 1 }}><div style={{ fontSize: 15, fontWeight: 700 }}>{title}</div><div style={{ fontSize: 12, color: MUTED }}>{sub}</div></div>
      <ChevIcon c={MUTED} />
    </div>
  );
}

// ═══ NEW TOOL: MEDS ═══════════════════════════════════════════════
function Meds({ d, setD, now, back }) {
  const [view, setView] = useState("week");
  const [sel, setSel] = useState(new Date(now));
  const selKey = dayKey(sel);
  const [edit, setEdit] = useState(false);
  const checks = d.medChecks[selKey] || {};

  const toggle = (id) => { const day = { ...(d.medChecks[selKey] || {}) }; day[id] = !day[id]; setD({ ...d, medChecks: { ...d.medChecks, [selKey]: day } }); };
  const setMed = (id, f, v) => setD({ ...d, meds: d.meds.map((m) => m.id === id ? { ...m, [f]: v } : m) });

const BUILTIN_CATEGORIES = ["money", "health", "plan", "more"];
const CATEGORY_LABEL = { money: "Money", health: "Health", plan: "Plan", more: "More" };
function getCategories(d) {
  const custom = [...new Set(d.blocks.map((b) => b.category || "plan").filter((c) => !BUILTIN_CATEGORIES.includes(c)))];
  return [...BUILTIN_CATEGORIES, ...custom];
}
function makeBlock(type, category, title) {
  const t = (title || "").trim() || ({ checklist: "New checklist", list: "New list", schedule: "New schedule", notes: "New note", mood: "New mood tracker" }[type]);
  const base = { id: uid(), type, category, title: t };
  if (type === "mood") return { ...base, monthStamp: monthKey(), moods: [{ id: uid(), label: "Great", color: "#5A6B4D" }, { id: uid(), label: "Okay", color: "#D9B16A" }, { id: uid(), label: "Low", color: "#6E8597" }, { id: uid(), label: "Hard", color: "#C8783C" }], days: {} };
  if (type === "notes") return { ...base, items: "" };
  if (type === "schedule") return { ...base, items: [{ time: "", t: "" }] };
  return { ...base, items: [{ t: "", done: false }] };
}
function AddBlockMenu({ d, setD, go }) {
  const [open, setOpen] = useState(false);
  const [type, setType] = useState("checklist");
  const [title, setTitle] = useState("");
  const [cat, setCat] = useState("plan");
  const [customCat, setCustomCat] = useState("");
  const cats = getCategories(d);
  const reset = () => { setOpen(false); setType("checklist"); setTitle(""); setCat("plan"); setCustomCat(""); };
  const create = () => {
    const finalCat = (cat === "__new" ? customCat.trim().toLowerCase() : cat) || "plan";
    const b = makeBlock(type, finalCat, title);
    setD({ ...d, blocks: [...d.blocks, b] });
    reset();
    go("plan", "block:" + b.id);
  };
  if (!open) return <button onClick={() => setOpen(true)} style={{ ...addBtn, marginTop: 12 }}>+ Add a space</button>;
  return (
    <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "16px", marginTop: 12 }}>

      <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, marginBottom: 6 }}>TYPE</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 12 }}>
        {Object.entries(BLOCK_META).map(([k, m]) => (
          <div key={k} className="pop" onClick={() => setType(k)} style={{ border: `1.5px solid ${type === k ? m.color : LINE}`, background: type === k ? m.color + "1A" : "transparent", borderRadius: 4, padding: "9px 11px", display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <m.icon c={m.color} s={16} />
            <span style={{ fontSize: 13, fontWeight: 700 }}>{m.label}</span>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, marginBottom: 6 }}>CATEGORY (where it appears in the menu)</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
        {cats.map((c) => (
          <div key={c} className="pop" onClick={() => setCat(c)} style={{ border: `1.5px solid ${cat === c ? INK : LINE}`, background: cat === c ? INK : "transparent", color: cat === c ? PAPER : INK, borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 700, textTransform: "capitalize" }}>{CATEGORY_LABEL[c] || c}</div>
        ))}
        <div className="pop" onClick={() => setCat("__new")} style={{ border: `1.5px dashed ${cat === "__new" ? INK : LINE}`, borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 700, color: cat === "__new" ? INK : MUTED }}>+ New</div>
      </div>
      {cat === "__new" && <input value={customCat} onChange={(e) => setCustomCat(e.target.value)} placeholder="Category name" style={{ width: "100%", border: `1px solid ${LINE}`, borderRadius: 3, padding: "9px 11px", fontSize: 13, fontWeight: 600, marginBottom: 10 }} />}
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={reset} style={{ flex: 1, background: "none", border: `1.5px solid ${LINE}`, color: MUTED, fontWeight: 700, fontSize: 14, padding: "12px", borderRadius: 4, cursor: "pointer" }}>Cancel</button>
        <button onClick={create} disabled={cat === "__new" && !customCat.trim()} style={{ flex: 1, background: INK, border: "none", color: PAPER, fontWeight: 700, fontSize: 14, padding: "12px", borderRadius: 4, cursor: "pointer", opacity: cat === "__new" && !customCat.trim() ? .4 : 1 }}>Create</button>
      </div>
    </div>
  );
}

function WeekStrip({ weekDays, sel, setSel, now, doneFor, totalFor }) {

function dayCompletion(d, dt) {
  const k = dayKey(dt), checks = d.habitChecks[k] || {}, oneoffs = d.habitOneoffs[k] || [];
  const doneRec = d.habitDefs.filter((h) => checks[h.id]).length, doneOne = oneoffs.filter((o) => o.done).length;
  const total = d.habitDefs.length + oneoffs.length, done = doneRec + doneOne;
  return { total, done, pct: total ? done / total : 0 };
}
function habitStreaks(d, habitId, now) {
  let current = 0; const cursor = new Date(now);
  if (!(d.habitChecks[dayKey(cursor)] || {})[habitId]) cursor.setDate(cursor.getDate() - 1);
  for (let i = 0; i < 366; i++) { if ((d.habitChecks[dayKey(cursor)] || {})[habitId]) { current++; cursor.setDate(cursor.getDate() - 1); } else break; }
  const dim = daysInMonth(now); let best = 0, run = 0;
  for (let day = 1; day <= dim; day++) { const k = `${now.getFullYear()}-${now.getMonth() + 1}-${day}`; if ((d.habitChecks[k] || {})[habitId]) { run++; if (run > best) best = run; } else run = 0; }
  return { current, best };
}
