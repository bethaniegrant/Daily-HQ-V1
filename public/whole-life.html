// ─── Daily Time Blocking ───────────────────────────────────

const TB_COLORS = ["#B8C8D8", "#C4717A", "#7d8a5e", "#9a7e8e", "#E0C097", "#7a8a93"];
const tbNextStart = (blocks) => {
  if (!blocks || !blocks.length) {
    const h = new Date().getHours();
    return `${String(h).padStart(2, "0")}:00`;
  }
  const sorted = [...blocks].sort((a, b) => (a.end || "").localeCompare(b.end || ""));
  return sorted[sorted.length - 1].end || "09:00";
};
const tbAddHour = (hhmm) => {
  if (!hhmm || !hhmm.includes(":")) return "10:00";
  const [h, m] = hhmm.split(":").map(Number);
  const nh = Math.min(23, (h || 0) + 1);
  return `${String(nh).padStart(2, "0")}:${String(m || 0).padStart(2, "0")}`;
};

function TimeBlocking({ d, setD, now, isDesktop }) {
  const [day, setDay] = useState(new Date(now));
  const [editingId, setEditingId] = useState(null);
  const [adding, setAdding] = useState(false);
  const dk = dayKey(day);
  const blocks = (d.timeBlocks && d.timeBlocks[dk]) || [];
  const sorted = [...blocks].sort((a, b) => (a.start || "").localeCompare(b.start || ""));

  const setBlocks = (next) => setD({ ...d, timeBlocks: { ...(d.timeBlocks || {}), [dk]: next } });
  const shiftDay = (delta) => { const nd = new Date(day); nd.setDate(nd.getDate() + delta); setDay(nd); setEditingId(null); setAdding(false); };
  const jumpToday = () => { setDay(new Date(now)); setEditingId(null); setAdding(false); };

  const saveBlock = (b) => {
    const exists = sorted.find((x) => x.id === b.id);
    if (exists) setBlocks(blocks.map((x) => x.id === b.id ? b : x));
    else setBlocks([...blocks, b]);
  };
  const deleteBlock = (id) => setBlocks(blocks.filter((x) => x.id !== id));

  const enabled = d.timeBlockingEnabled === true;
  if (!enabled) {
    return (
      <div style={{ background: CARD, border: `1px dashed ${LINE}`, borderRadius: 12, padding: isDesktop ? "14px 18px" : "12px 14px", display: "flex", flexDirection: isDesktop ? "row" : "column", gap: 12, alignItems: isDesktop ? "center" : "flex-start", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 14, fontFamily: "'DM Serif Display',serif", color: TEXT, marginBottom: 3 }}>Daily Time Blocking</div>
          <div style={{ fontSize: 12, color: MUTED }}>Map out your day in gentle blocks.</div>
        </div>
        <button onClick={() => setD({ ...d, timeBlockingEnabled: true })} className="pop" style={{ background: SAGE, color: CARD, border: "none", borderRadius: 999, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", letterSpacing: ".04em", whiteSpace: "nowrap" }}>Enable</button>
      </div>
    );
  }


  const dateLabel = day.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const isToday = dayKey(day) === dayKey(new Date(now));

  return (
    <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: isDesktop ? "14px 18px 12px" : "12px 14px 10px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 14, fontFamily: "'DM Serif Display',serif", color: TEXT }}>Daily Time Blocking</div>
        <button onClick={() => setD({ ...d, timeBlockingEnabled: false })} title="Turn off time blocking" style={{ background: "transparent", border: "none", color: MUTED, fontSize: 10, cursor: "pointer", letterSpacing: ".08em", textTransform: "uppercase", fontWeight: 600 }}>Hide</button>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 10 }}>
        <button onClick={() => shiftDay(-1)} aria-label="Previous day" style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 999, width: 26, height: 26, cursor: "pointer", color: TEXT, fontSize: 14, lineHeight: 1 }}>‹</button>
        <button onClick={jumpToday} style={{ background: "transparent", border: "none", cursor: "pointer", textAlign: "center", padding: "2px 6px" }}>
          <div style={{ fontSize: 14, fontFamily: "'DM Serif Display',serif", color: TEXT }}>{dateLabel}</div>
          {!isToday && <div style={{ fontSize: 9, letterSpacing: ".16em", textTransform: "uppercase", color: SAGE, fontWeight: 700, marginTop: 1 }}>Tap for today</div>}
        </button>
        <button onClick={() => shiftDay(1)} aria-label="Next day" style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 999, width: 26, height: 26, cursor: "pointer", color: TEXT, fontSize: 14, lineHeight: 1 }}>›</button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {sorted.length === 0 && !adding && (
          <div style={{ fontSize: 12, color: MUTED, textAlign: "center", padding: "10px 0" }}>No blocks yet for this day.</div>
        )}
        {sorted.map((b) => (
          editingId === b.id
            ? <TBEditor key={b.id} initial={b} onSave={(nb) => { saveBlock(nb); setEditingId(null); }} onCancel={() => setEditingId(null)} onDelete={() => { deleteBlock(b.id); setEditingId(null); }} keepOpen={false} />
            : <TBRow key={b.id} block={b} onEdit={() => { setEditingId(b.id); setAdding(false); }} onDelete={() => deleteBlock(b.id)} />
        ))}

        {adding ? (
          <TBEditor
            initial={{ id: uid(), label: "", start: tbNextStart(sorted), end: tbAddHour(tbNextStart(sorted)), color: TB_COLORS[sorted.length % TB_COLORS.length] }}
            onSave={(nb) => { saveBlock(nb); /* keep editor open with next start prefilled */ setAdding(true); }}
            onCancel={() => setAdding(false)}
            keepOpen
            resetSignal={sorted.length}
          />
        ) : (
          <button onClick={() => { setAdding(true); setEditingId(null); }} className="pop" style={{ marginTop: 2, background: PAPER, border: `1px dashed ${LINE}`, borderRadius: 8, padding: "8px 10px", color: SAGE, fontWeight: 600, fontSize: 12, cursor: "pointer", textAlign: "left" }}>+ Add block</button>
        )}
      </div>
    </div>
  );
}


function TBRow({ block, onEdit, onDelete }) {
  return (
    <div className="pop" style={{ display: "flex", alignItems: "stretch", gap: 8, background: PAPER, borderRadius: 8, overflow: "hidden", border: `1px solid ${LINE}` }}>
      <div style={{ width: 3, background: block.color || MIST }} />
      <button onClick={onEdit} style={{ flex: 1, background: "transparent", border: "none", textAlign: "left", padding: "8px 4px", cursor: "pointer", display: "flex", flexDirection: "column", gap: 1 }}>
        <div style={{ fontSize: 9, letterSpacing: ".12em", textTransform: "uppercase", color: MUTED, fontWeight: 700 }}>{fmtTime(block.start)} – {fmtTime(block.end)}</div>
        <div style={{ fontSize: 13, color: TEXT, fontFamily: "'DM Serif Display',serif" }}>{block.label || "(untitled)"}</div>
      </button>
      <button onClick={onDelete} aria-label="Delete block" style={{ background: "transparent", border: "none", color: MUTED, padding: "0 12px", cursor: "pointer", fontSize: 14 }}>×</button>
    </div>
  );
}


function TBEditor({ initial, onSave, onCancel, onDelete, keepOpen, resetSignal }) {
  const [label, setLabel] = useState(initial.label || "");
  const [start, setStart] = useState(initial.start || "09:00");
  const [end, setEnd] = useState(initial.end || "10:00");
  const [color, setColor] = useState(initial.color || TB_COLORS[0]);
  const inputRef = useRef(null);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  // When parent signals a new "next add" slot, reset the form to those defaults.
  useEffect(() => {
    if (!keepOpen) return;
    setLabel("");
    setStart(initial.start || "09:00");
    setEnd(initial.end || "10:00");
    setColor(initial.color || TB_COLORS[0]);
    if (inputRef.current) inputRef.current.focus();
  }, [resetSignal]); // eslint-disable-line

  const commit = () => {
    const trimmed = (label || "").trim();
    if (!trimmed) return;
    onSave({ id: initial.id, label: trimmed, start, end, color });
  };
  const onKey = (e) => { if (e.key === "Enter") { e.preventDefault(); commit(); } if (e.key === "Escape") onCancel && onCancel(); };

  return (
    <div style={{ display: "flex", alignItems: "stretch", gap: 8, background: PAPER, borderRadius: 8, overflow: "hidden", border: `1.5px solid ${SAGE}` }}>
      <div style={{ width: 3, background: color }} />
      <div style={{ flex: 1, padding: "8px 6px", display: "flex", flexDirection: "column", gap: 6 }}>
        <input ref={inputRef} value={label} onChange={(e) => setLabel(e.target.value)} onKeyDown={onKey} placeholder="What's this block?" style={{ width: "100%", border: `1px solid ${LINE}`, borderRadius: 6, background: CARD, padding: "6px 8px", fontSize: 13, color: TEXT, fontFamily: "inherit", outline: "none" }} />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          <input type="time" value={start} onChange={(e) => setStart(e.target.value)} onKeyDown={onKey} style={{ border: `1px solid ${LINE}`, borderRadius: 6, background: CARD, padding: "4px 6px", fontSize: 12, color: TEXT, fontFamily: "inherit" }} />
          <span style={{ color: MUTED, fontSize: 11 }}>to</span>
          <input type="time" value={end} onChange={(e) => setEnd(e.target.value)} onKeyDown={onKey} style={{ border: `1px solid ${LINE}`, borderRadius: 6, background: CARD, padding: "4px 6px", fontSize: 12, color: TEXT, fontFamily: "inherit" }} />
          <div style={{ display: "flex", gap: 5, marginLeft: "auto" }}>
            {TB_COLORS.map((c) => (
              <button key={c} onClick={() => setColor(c)} aria-label={"Color " + c} style={{ width: 16, height: 16, borderRadius: 999, background: c, border: color === c ? `2px solid ${TEXT}` : `1px solid ${LINE}`, cursor: "pointer", padding: 0 }} />
            ))}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", alignItems: "center" }}>
          {onDelete && <button onClick={onDelete} style={{ background: "transparent", border: "none", color: MUTED, fontSize: 11, cursor: "pointer", marginRight: "auto" }}>Delete</button>}
          <button onClick={onCancel} style={{ background: "transparent", border: `1px solid ${LINE}`, borderRadius: 999, padding: "5px 12px", fontSize: 11, color: MUTED, cursor: "pointer" }}>{keepOpen ? "Done" : "Cancel"}</button>
          <button onClick={commit} style={{ background: SAGE, color: CARD, border: "none", borderRadius: 999, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{keepOpen ? "Save & add next" : "Save"}</button>
        </div>
      </div>
    </div>
  );
}


function TodayList({ d, setD, dt, go, isDesktop }) {
  const tk = dayKey(dt);
  const isToday = tk === dayKey(new Date());
  const sameMonth = dt.getFullYear() === new Date().getFullYear() && dt.getMonth() === new Date().getMonth();
  const todoBlock = d.blocks.find((b) => b.type === "checklist" && /to ?do/i.test(b.title || ""));
  const moodBlock = d.blocks.find((b) => b.type === "mood");
  const moodId = sameMonth && moodBlock && moodBlock.days ? moodBlock.days[dt.getDate()] : null;
  const moodForDay = moodId && moodBlock ? moodBlock.moods.find((m) => m.id === moodId) : null;

  const habitChecks = d.habitChecks[tk] || {};
  const oneoffs = d.habitOneoffs[tk] || [];
  const toggleHabit = (id) => {
    const day = { ...(d.habitChecks[tk] || {}) };
    day[id] = !day[id];
    setD({ ...d, habitChecks: { ...d.habitChecks, [tk]: day } });
  };
  const toggleOneoff = (id) => setD({
    ...d,
    habitOneoffs: { ...d.habitOneoffs, [tk]: (d.habitOneoffs[tk] || []).map((o) => o.id === id ? { ...o, done: !o.done } : o) },
  });
  const toggleTodo = (idx) => todoBlock && setD({
    ...d,
    blocks: d.blocks.map((b) => b.id === todoBlock.id
      ? { ...b, items: (b.items || []).map((it, j) => j === idx ? { ...it, done: !it.done } : it) }
      : b),
  });
  const toggleMed = (m) => {
    const t = medTimes(m);
    const day = { ...(d.medChecks[tk] || {}) };
    const taken = medFullyTaken(day[m.id], t);
    day[m.id] = taken ? medDoseArr(null, t) : Array(t).fill(true);
    setD({ ...d, medChecks: { ...d.medChecks, [tk]: day } });
  };
  const toggleMedDose = (m, i) => {
    const t = medTimes(m);
    const day = { ...(d.medChecks[tk] || {}) };
    const arr = medDoseArr(day[m.id], t);
    arr[i] = !arr[i];
    day[m.id] = arr;
    setD({ ...d, medChecks: { ...d.medChecks, [tk]: day } });
  };
  const delEvent = (blockId, eventId) => setD({
    ...d,
    blocks: d.blocks.map((b) => b.id === blockId ? { ...b, events: (b.events || []).filter((e) => e.id !== eventId) } : b),
  });
  // Not Today: bump a todo to tomorrow (keeps it un-done, doesn't delete).
  const bumpTodo = (idx) => {
    if (!todoBlock) return;
    const t = new Date(dt); t.setDate(t.getDate() + 1);
    const nextDate = `${t.getFullYear()}-${t.getMonth() + 1}-${t.getDate()}`;
    setD({
      ...d,
      blocks: d.blocks.map((b) => b.id === todoBlock.id
        ? { ...b, items: (b.items || []).map((it, j) => j === idx ? { ...it, date: nextDate, done: false } : it) }
        : b),
    });
  };

  const bundle = dayBundle(d, dt);

  const habitRows = isToday ? [
    ...d.habitDefs.map((h) => ({ kind: "habit", id: h.id, label: h.n, done: !!habitChecks[h.id], color: SAGE, onToggle: () => toggleHabit(h.id) })),
    ...oneoffs.map((o) => ({ kind: "habit", id: o.id, label: o.n, done: !!o.done, color: SAGE, onToggle: () => toggleOneoff(o.id) })),
  ] : [];
  const todoRows = bundle.todos.map((it) => ({ kind: "todo", id: "t" + it.idx, label: it.t || "Untitled", done: !!it.done, color: AMBER, onToggle: () => toggleTodo(it.idx), onBump: () => bumpTodo(it.idx) }));
  const medRows = isToday ? d.meds.flatMap((m) => {
    const t = medTimes(m);
    const arr = medDoseArr((d.medChecks[tk] || {})[m.id], t);
    const sched = medSchedule(m);
    const base = (m.n || "Medication") + (m.dose ? ` · ${m.dose}` : "");
    if (t <= 1) {
      return [{ kind: "med", id: m.id, label: base, time: sched[0] || "", done: arr[0], color: PLUM, onToggle: () => toggleMedDose(m, 0) }];
    }
    return arr.map((v, i) => ({ kind: "med", id: m.id + ":" + i, label: base, time: sched[i] || "", sub: sched[i] ? fmtTime(sched[i]) : `Dose ${i + 1} of ${t}`, done: !!v, color: PLUM, onToggle: () => toggleMedDose(m, i) }));
  }).sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99")) : [];
  const billRows = bundle.bills.map((b, idx) => ({
    id: `${b.section}:${b.n}:${idx}`,
    label: `${b.n || "Bill"}${b.a ? ` · $${money(b.a)}` : ""}`,
    section: b.section,
    color: b.color || AMBER,
  }));
  const eventRows = bundle.events;

  const taskRows = [...habitRows, ...todoRows];
  const all = [...taskRows, ...medRows];
  const doneCount = all.filter((r) => r.done).length;
  const medsDoneCount = medRows.filter((r) => r.done).length;

  const note = (d.dayNotes && d.dayNotes[tk]) || "";
  const setNote = (v) => setD({ ...d, dayNotes: { ...(d.dayNotes || {}), [tk]: v } });

  return (
    <div style={{ display: "grid", gap: 12 }}>
      {all.length > 0 && (
        <div style={{ display: "flex", justifyContent: "flex-end", fontSize: 10, color: MUTED, fontWeight: 700, letterSpacing: ".12em", textTransform: "uppercase" }}>{doneCount}/{all.length} done</div>
      )}

      <button
        onClick={() => go("health", moodBlock ? "block:" + moodBlock.id : null)}
        className="pop"
        style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, background: "none", border: `1px dashed ${LINE}`, borderRadius: 12, padding: "10px 12px", cursor: "pointer", textAlign: "left" }}
      >
        <span style={{ width: 20, height: 20, borderRadius: 5, background: moodForDay ? moodForDay.color : "transparent", border: `1.5px solid ${moodForDay ? moodForDay.color : LINE}`, flexShrink: 0 }} />
        <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: TEXT, letterSpacing: "-.01em" }}>
          {moodForDay ? `Mood — ${moodForDay.label}` : (isToday ? "Track today's mood" : "No mood logged")}
        </span>
        <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".18em", textTransform: "uppercase", color: AMBER }}>Open →</span>
      </button>

      {eventRows.length > 0 && (
        <div style={{ display: "grid", gap: 6 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED }}>Events</div>
          {eventRows.map((e) => (
            <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: PAPER, border: `1px solid ${LINE}`, borderRadius: 8 }}>
              <span style={{ width: 7, height: 7, borderRadius: 999, background: "#6E8597", flexShrink: 0 }} />
              <span style={{ flex: 1, minWidth: 0, fontSize: 13, color: TEXT, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title || "Untitled"}{e.start ? ` · ${e.start}` : ""}</span>
              <button onClick={() => delEvent(e.blockId, e.id)} className="pop" title="Remove event" style={{ background: "none", border: "none", color: MUTED, cursor: "pointer", fontSize: 14, padding: 0, lineHeight: 1 }}>×</button>
            </div>
          ))}
        </div>
      )}

      {billRows.length > 0 && (
        <div style={{ display: "grid", gap: 6 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".16em", textTransform: "uppercase", color: MUTED }}>Bills due</div>
          {billRows.map((b) => (
            <div key={b.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: PAPER, border: `1px solid ${LINE}`, borderRadius: 8 }}>
              <span style={{ width: 7, height: 7, borderRadius: 999, background: b.color, flexShrink: 0 }} />
              <span style={{ flex: 1, minWidth: 0, fontSize: 13, color: TEXT, fontWeight: 700 }}>{b.label}</span>
              <span style={{ border: `1px solid ${AMBER}`, borderRadius: 3, padding: "1px 5px", fontSize: 9, fontWeight: 800, letterSpacing: ".12em", textTransform: "uppercase", color: AMBER, whiteSpace: "nowrap" }}>↻ Monthly</span>
            </div>
          ))}
        </div>
      )}

      {all.length === 0 && billRows.length === 0 && eventRows.length === 0 ? (
        <div style={{ fontSize: 13, color: MUTED, fontStyle: "italic", fontFamily: "'DM Serif Display',serif", padding: "10px 4px" }}>Nothing scheduled. Use “+ Add” above to drop in a to-do or event for this day.</div>

      ) : (
        <>
          {taskRows.length > 0 && (
            <div style={{ display: "grid", gap: 6 }}>
              {taskRows.map((r) => (
                <div key={r.kind + ":" + r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 2px" }}>
                  <input type="checkbox" checked={r.done} onChange={r.onToggle} style={{ width: 16, height: 16, accentColor: r.color, cursor: "pointer", flexShrink: 0 }} />
                  <span style={{ width: 5, height: 5, borderRadius: 999, background: r.color, flexShrink: 0 }} />
                  <span onClick={r.onToggle} style={{ flex: 1, fontSize: 13, color: r.done ? MUTED : TEXT, textDecoration: r.done ? "line-through" : "none", fontWeight: 500, cursor: "pointer" }}>{r.label}</span>
                  {r.kind === "todo" && !r.done && r.onBump && (
                    <button onClick={r.onBump} className="pop" title="Move to tomorrow" style={{ background: "none", border: `1px solid ${AMBER}`, color: AMBER, borderRadius: 999, padding: "2px 8px", fontSize: 9, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer" }}>Not today</button>
                  )}
                  <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".18em", textTransform: "uppercase", color: MUTED }}>{r.kind === "habit" ? "Habit" : "To do"}</span>
                </div>
              ))}
            </div>
          )}
          {medRows.length > 0 && (
            <div style={{ display: "grid", gap: 6, marginTop: taskRows.length > 0 ? 4 : 0, paddingTop: taskRows.length > 0 ? 10 : 0, borderTop: taskRows.length > 0 ? `1px dashed ${LINE}` : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".16em", textTransform: "uppercase", color: PLUM }}>Medications</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: MUTED }}>{medsDoneCount}/{medRows.length}</div>
              </div>
              {medRows.map((r) => (
                <label key={"med:" + r.id} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "6px 8px", background: r.done ? "transparent" : "rgba(122,90,124,.06)", border: `1px solid ${r.done ? "transparent" : LINE}`, borderRadius: 8 }}>
                  <input type="checkbox" checked={r.done} onChange={r.onToggle} style={{ width: 16, height: 16, accentColor: PLUM, cursor: "pointer", flexShrink: 0 }} />
                  {r.time ? (
                    <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".06em", color: r.done ? MUTED : PLUM, minWidth: 58, fontVariantNumeric: "tabular-nums" }}>{fmtTime(r.time)}</span>
                  ) : (
                    <span style={{ width: 5, height: 5, borderRadius: 999, background: PLUM, flexShrink: 0 }} />
                  )}
                  <span style={{ flex: 1, fontSize: 13, color: r.done ? MUTED : TEXT, textDecoration: r.done ? "line-through" : "none", fontWeight: 600 }}>
                    {r.label}{!r.time && r.sub ? ` · ${r.sub}` : ""}
                  </span>
                </label>
              ))}
            </div>
          )}
        </>
      )}

      <div style={{ display: "flex", gap: 14, justifyContent: "flex-end" }}>
        <button onClick={() => go("plan", "habits")} className="pop" style={{ background: "none", border: "none", fontSize: 10, fontWeight: 700, color: AMBER, letterSpacing: ".12em", textTransform: "uppercase", cursor: "pointer" }}>Habits</button>
        {todoBlock && <button onClick={() => go("plan", "block:" + todoBlock.id)} className="pop" style={{ background: "none", border: "none", fontSize: 10, fontWeight: 700, color: AMBER, letterSpacing: ".12em", textTransform: "uppercase", cursor: "pointer" }}>To do</button>}
        <button onClick={() => go("health", "meds")} className="pop" style={{ background: "none", border: "none", fontSize: 10, fontWeight: 700, color: AMBER, letterSpacing: ".12em", textTransform: "uppercase", cursor: "pointer" }}>Meds</button>
      </div>

    </div>
  );
}

function QuickAddForm({ d, setD, defaultDate, onDone }) {
  const [type, setType] = useState("todo");
  const [title, setTitle] = useState("");
  const [date, setDate] = useState(defaultDate);
  const [time, setTime] = useState("");
  const save = () => {
    if (!title.trim()) return;
    quickAddItem(d, setD, { type, title, date, time: type === "event" ? time : "" });
    setTitle(""); setTime("");
    onDone && onDone();
  };
  const segBtn = (id, label) => (
    <button key={id} onClick={() => setType(id)} className="pop" style={{
      flex: 1, padding: "6px 8px", borderRadius: 6, border: "none", cursor: "pointer",
      background: type === id ? PAPER : "rgba(255,255,255,.06)",
      color: type === id ? INK : MIST,
      fontSize: 10, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase",
    }}>{label}</button>
  );
  const inputStyle = { width: "100%", border: "1px solid rgba(255,255,255,.18)", background: "rgba(255,255,255,.08)", color: PAPER, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none" };
  return (
    <div style={{ marginTop: 10, padding: 10, background: "rgba(255,255,255,.05)", borderRadius: 10, display: "grid", gap: 8 }}>
      <div style={{ display: "flex", gap: 4 }}>{segBtn("todo", "To Do")}{segBtn("event", "Event")}</div>
      <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder={type === "todo" ? "What needs doing?" : "Event title"} style={inputStyle} onKeyDown={(e) => e.key === "Enter" && save()} />
      <div style={{ display: "flex", gap: 6 }}>
        <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ ...inputStyle, flex: 1 }} />
        {type === "event" && <input type="time" value={time} onChange={(e) => setTime(e.target.value)} style={{ ...inputStyle, width: 110 }} />}
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
        <button onClick={onDone} className="pop" style={{ background: "transparent", border: "none", color: MIST, fontSize: 10, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", cursor: "pointer" }}>Cancel</button>

      <DayViewToggle view={view} setView={setView} />
      {view === "week"
        ? <WeekStrip weekDays={weekDays} sel={sel} setSel={setSel} now={now} doneFor={(dt) => medsTakenOn(dt)} totalFor={() => d.meds.length} />
        : <MonthGrid sel={sel} setSel={setSel} now={now} fillFor={(dt) => { const t = d.meds.length, done = medsTakenOn(dt); return t && done === t ? PLUM : done ? PLUM + "33" : null; }} />}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 0 10px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: TEXT, fontFamily: "'DM Serif Display',serif" }}>{selLabel}</div>
        <div className="pop" onClick={() => setEdit(!edit)} style={{ fontSize: 12, fontWeight: 700, color: PLUM, cursor: "pointer" }}>{edit ? "Done" : "Edit meds"}</div>
      </div>

      {edit ? (
        <div style={{ display: "grid", gap: 12 }}>
          {d.meds.map((m) => {
            const sched = medSchedule(m);
            return (
            <div key={m.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 6, padding: "14px 16px", display: "grid", gap: 10 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input value={m.n} onChange={(e) => setMed(m.id, "n", e.target.value)} placeholder="Medication name" style={{ flex: 1, border: `1px solid ${LINE}`, borderRadius: 4, padding: "10px 12px", fontSize: 14, fontWeight: 700 }} />
                <div className="pop" onClick={() => delMed(m.id)} title="Remove medication" style={{ cursor: "pointer", opacity: .5, padding: 4 }}><XIcon c={MUTED} s={16} /></div>
              </div>
              <input value={m.dose} onChange={(e) => setMed(m.id, "dose", e.target.value)} placeholder="Dose (e.g. 200 mg, 1 tablet)" style={{ border: `1px solid ${LINE}`, borderRadius: 4, padding: "9px 11px", fontSize: 13 }} />

              <div style={{ display: "grid", gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".14em", textTransform: "uppercase", color: MUTED }}>Schedule</div>
                {sched.map((time, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", background: PAPER, border: `1px solid ${LINE}`, borderRadius: 4, padding: "6px 10px" }}>
                    <span style={{ fontSize: 11, fontWeight: 800, color: PLUM, minWidth: 52, letterSpacing: ".06em", textTransform: "uppercase" }}>Dose {i + 1}</span>
                    <input
                      type="time"
                      value={time}
                      onChange={(e) => setDoseTime(m.id, i, e.target.value)}
                      style={{ flex: 1, border: "none", background: "transparent", fontSize: 14, fontWeight: 600, color: TEXT, outline: "none", fontFamily: "inherit" }}
                    />
                    {time && <span style={{ fontSize: 11, color: MUTED, fontWeight: 600 }}>{fmtTime(time)}</span>}
                    {sched.length > 1 && (
                      <div className="pop" onClick={() => removeDose(m.id, i)} title="Remove dose" style={{ cursor: "pointer", opacity: .5, padding: 2 }}><XIcon c={MUTED} s={13} /></div>
                    )}
                  </div>
                ))}
                {sched.length < 12 && (
                  <button onClick={() => addDose(m.id)} className="pop" style={{ background: "transparent", border: `1px dashed ${PLUM}`, color: PLUM, borderRadius: 4, padding: "7px 10px", fontSize: 11, fontWeight: 800, letterSpacing: ".12em", textTransform: "uppercase", cursor: "pointer" }}>+ Add dose time</button>
                )}
              </div>
            </div>
            );
          })}
          <button onClick={addMed} style={addBtn}>+ Add a medication</button>
        </div>
      ) : (
        <div style={{ display: "grid", gap: 9 }}>
          {d.meds.length === 0 && <Note>No meds yet. Tap "Edit meds" to add your first.</Note>}
          {d.meds.map((m) => {
            const t = medTimes(m);
            const sched = medSchedule(m);
            const doses = medDoseArr(checks[m.id], t);
            const doneCount = doses.filter(Boolean).length;
            const allTaken = doneCount >= t;
            return (
              <div key={m.id} style={{ background: allTaken ? INK : CARD, color: allTaken ? PAPER : INK, borderRadius: 6, padding: "14px 16px", display: "grid", gap: 10, border: allTaken ? "none" : `1px solid ${LINE}` }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                  <div style={{ fontSize: 15, fontWeight: 700, textDecoration: allTaken ? "line-through" : "none" }}>{m.n || "Unnamed"}</div>
                  {m.dose && <div style={{ fontSize: 12, color: allTaken ? "rgba(244,241,234,.6)" : MUTED }}>{m.dose}</div>}
                  <div style={{ marginLeft: "auto", fontSize: 11, fontWeight: 800, color: allTaken ? "rgba(244,241,234,.7)" : MUTED, letterSpacing: ".06em" }}>{doneCount}/{t}</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 6 }}>
                  {doses.map((on, i) => (
                    <div key={i} className="pop" onClick={() => toggle(m.id, i, t)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 4, border: `1.5px solid ${on ? SAGEHI : (allTaken ? "rgba(244,241,234,.2)" : PLUM + "55")}`, background: on ? SAGEHI + "22" : "transparent", cursor: "pointer" }}>
                      <div style={{ width: 18, height: 18, borderRadius: 3, border: `2px solid ${on ? SAGEHI : PLUM}`, background: on ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {on && <CheckIcon c={INK} s={12} />}
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: allTaken ? PAPER : (on ? INK : TEXT), fontVariantNumeric: "tabular-nums" }}>{sched[i] ? fmtTime(sched[i]) : `Dose ${i + 1}`}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      <p style={tip}>Set a time for each dose to see them show up on your day at a glance. Tracking resets each month.</p>
    </Screen>
  );
}

// ═══ NEW TOOL: WORKOUTS ═══════════════════════════════════════════
function Workouts({ d, setD, go, back, now }) {
  const [sel, setSel] = useState(new Date(now));
  const addWorkout = () => {
    const w = { id: uid(), n: "New workout", cat: "other", ex: [{ id: uid(), n: "", sets: "", reps: "", w: "" }] };
    setD({ ...d, workouts: [...d.workouts, w] });
    go("health", "workout:" + w.id);
  };

  // categories done on a given date (any exercise of that workout checked)
  const catsDoneOn = (dt) => {
    const dayLog = d.workoutDone[dayKey(dt)] || {};
    const set = new Set();
    d.workouts.forEach((w) => {
      const wl = dayLog[w.id] || {};
      if (w.ex.some((e) => wl[e.id])) set.add(w.cat || "other");
    });
    return [...set];
  };
  const fullDoneOn = (dt) => {
    const dayLog = d.workoutDone[dayKey(dt)] || {};
    const set = new Set();
    d.workouts.forEach((w) => {
      const wl = dayLog[w.id] || {};
      if (w.ex.length && w.ex.every((e) => wl[e.id])) set.add(w.cat || "other");
    });
    return set;
  };

  // monthly stats
  const dim = daysInMonth(sel);
  const activeDays = (() => { let n = 0; for (let i = 1; i <= dim; i++) if (catsDoneOn(new Date(sel.getFullYear(), sel.getMonth(), i)).length) n++; return n; })();
  const usedCats = (() => { const s = new Set(); for (let i = 1; i <= dim; i++) catsDoneOn(new Date(sel.getFullYear(), sel.getMonth(), i)).forEach((c) => s.add(c)); return [...s]; })();

  const pad = firstWeekday(sel);
  const selKey = dayKey(sel);
  const selCats = catsDoneOn(sel);

  return (
    <Screen title="Workouts" sub="Train, log, track" back={back} accent={BLUE}>
      {/* CALENDAR */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "16px 14px", marginBottom: 14 }}>
        <div style={{ textAlign: "center", fontSize: 14, fontWeight: 700, color: TEXT, marginBottom: 10, fontFamily: "'DM Serif Display',serif" }}>
          {sel.toLocaleDateString("en-US", { month: "long", year: "numeric" })}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 5, marginBottom: 5 }}>
          {["S", "M", "T", "W", "T", "F", "S"].map((w, i) => <div key={i} style={{ textAlign: "center", fontSize: 9.5, fontWeight: 700, color: MUTED }}>{w}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 5 }}>
          {Array.from({ length: pad }).map((_, i) => <div key={"p" + i} />)}
          {Array.from({ length: dim }).map((_, i) => {
            const day = i + 1;
            const dt = new Date(sel.getFullYear(), sel.getMonth(), day);
            const cats = catsDoneOn(dt);
            const full = fullDoneOn(dt);
            const isSel = day === sel.getDate();
            const isTod = dayKey(dt) === dayKey(now);
            return (
              <div key={day} className="pop" onClick={() => setSel(dt)}
                style={{ aspectRatio: "1", borderRadius: 4, background: CARD, border: isSel ? `2px solid ${INK}` : isTod ? `2px solid ${SAGEHI}` : `1px solid ${LINE}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", padding: "4px 2px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: TEXT }}>{day}</div>
                <div style={{ display: "flex", gap: 2, flexWrap: "wrap", justifyContent: "center", minHeight: 6 }}>
                  {cats.slice(0, 4).map((c) => {
                    const col = catOf(c).color;
                    const solid = full.has(c);
                    return <div key={c} style={{ width: 6, height: 6, borderRadius: "50%", background: solid ? col : col + "55", border: solid ? "none" : `1px solid ${col}` }} />;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* LEGEND */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
        {WORKOUT_CATS.filter((c) => d.workouts.some((w) => (w.cat || "other") === c.id)).map((c) => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, color: TEXT, background: CARD, border: `1px solid ${LINE}`, borderRadius: 99, padding: "4px 10px" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: c.color }} />{c.label}
          </div>
        ))}
      </div>

      {/* MONTH STATS */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 10px", textAlign: "center" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 26, fontWeight: 600, color: BLUE, lineHeight: 1 }}>{activeDays}</div>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".08em", marginTop: 6 }}>Active days</div>
          <div style={{ fontSize: 10, color: MUTED, marginTop: 2 }}>this month</div>
        </div>
        <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 10px", textAlign: "center" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 26, fontWeight: 600, color: BLUE, lineHeight: 1 }}>{usedCats.length}</div>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".08em", marginTop: 6 }}>Categories</div>
          <div style={{ fontSize: 10, color: MUTED, marginTop: 2 }}>trained</div>
        </div>
      </div>

      {/* SELECTED DAY */}
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 11, letterSpacing: ".14em", textTransform: "uppercase", color: MIST, fontWeight: 700 }}>
          {sel.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}
        </div>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, fontWeight: 600, marginTop: 2 }}>
          {selCats.length ? selCats.map((c) => catOf(c).label).join(" · ") : "Rest day"}
        </div>
      </div>

      {/* WORKOUTS LIST */}
      <div style={{ fontSize: 11, letterSpacing: ".14em", textTransform: "uppercase", color: MUTED, fontWeight: 700, margin: "4px 0 8px" }}>Your workouts</div>
      <div style={{ display: "grid", gap: 11 }}>
        {d.workouts.map((w) => {
          const c = catOf(w.cat);
          return (
            <div key={w.id} className="pop" onClick={() => go("health", "workout:" + w.id)}
              style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${c.color}`, borderRadius: 4, padding: "16px 17px", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 42, height: 42, borderRadius: 4, background: c.color + "22", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <DumbbellIcon c={c.color} s={21} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 16, fontWeight: 700 }}>{w.n || "Untitled workout"}</div>
                <div style={{ fontSize: 12, color: MUTED, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
                    <span style={{ width: 7, height: 7, borderRadius: "50%", background: c.color }} />{c.label}
                  </span>
                  <span style={{ opacity: .5 }}>·</span>
                  <span>{w.ex.filter((e) => e.n.trim()).length} exercise{w.ex.filter((e) => e.n.trim()).length === 1 ? "" : "s"}</span>
                </div>
              </div>
              <ChevIcon c={MUTED} />
            </div>
          );
        })}
      </div>
      <button onClick={addWorkout} style={{ ...addBtn, marginTop: 14 }}>+ Build a workout</button>
      <p style={tip}>Each workout is tagged with a category. The calendar above shows colored dots for the categories you trained on each day.</p>
    </Screen>
  );
}
function WorkoutEditor({ workout, d, setD, now, back }) {
  const [mode, setMode] = useState("log"); // log | build
  const [sel, setSel] = useState(new Date(now));
  const selKey = dayKey(sel);
  const log = (d.workoutDone[selKey] || {})[workout.id] || {};
  const cat = catOf(workout.cat);

  const update = (patch) => setD({ ...d, workouts: d.workouts.map((w) => w.id === workout.id ? { ...w, ...patch } : w) });
  const del = () => { setD({ ...d, workouts: d.workouts.filter((w) => w.id !== workout.id) }); back(); };
  const setEx = (id, f, v) => update({ ex: workout.ex.map((e) => e.id === id ? { ...e, [f]: v } : e) });
  const addEx = () => update({ ex: [...workout.ex, { id: uid(), n: "", sets: "", reps: "", w: "" }] });
  const delEx = (id) => update({ ex: workout.ex.filter((e) => e.id !== id) });
  const toggleEx = (id) => { const day = { ...(d.workoutDone[selKey] || {}) }; const wl = { ...(day[workout.id] || {}) }; wl[id] = !wl[id]; day[workout.id] = wl; setD({ ...d, workoutDone: { ...d.workoutDone, [selKey]: day } }); };

  const exTotal = workout.ex.length;
  const doneCount = workout.ex.filter((e) => log[e.id]).length;
  const selLabel = sel.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

  // simple 7-day strip ending today
  const stripDays = Array.from({ length: 7 }, (_, i) => { const dt = new Date(now); dt.setDate(now.getDate() - (6 - i)); return dt; });

  return (
    <div className="fade">
      <div style={{ background: INK, color: PAPER, padding: "26px 22px 22px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
          <div onClick={back} className="pop" style={{ width: 40, height: 40, borderRadius: 3, border: `1px solid rgba(255,255,255,.25)`, display: "flex", alignItems: "center", justifyContent: "center" }}><ChevIcon c={PAPER} dir="left" /></div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase", color: MIST, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: cat.color }} /> {cat.label}
            </div>
          </div>
          <div onClick={del} className="pop" style={{ cursor: "pointer", color: MIST }}><TrashIcon c={MIST} s={18} /></div>
        </div>
        <input value={workout.n} onChange={(e) => update({ n: e.target.value })} placeholder="Name this workout" style={{ border: "none", background: "none", color: PAPER, fontFamily: "'DM Serif Display',serif", fontSize: 32, fontWeight: 600, width: "100%", letterSpacing: "-.02em" }} />
      </div>

      <div style={{ padding: "18px 18px 50px" }}>
        <div style={{ display: "flex", gap: 6, background: "#EAE6DB", borderRadius: 4, padding: 4, marginBottom: 16 }}>
          {[["log", "Log"], ["build", "Build"]].map(([v, lbl]) => (
            <div key={v} className="pop" onClick={() => setMode(v)} style={{ flex: 1, textAlign: "center", padding: "9px", borderRadius: 3, fontSize: 13, fontWeight: 700, background: mode === v ? CARD : "transparent", color: mode === v ? INK : MUTED }}>{lbl}</div>
          ))}
        </div>

        {mode === "log" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, marginBottom: 14 }}>
              {stripDays.map((dt) => {
                const k = dayKey(dt);
                const wl = (d.workoutDone[k] || {})[workout.id] || {};
                const done = workout.ex.filter((e) => wl[e.id]).length;
                const isSel = k === selKey, isTod = k === dayKey(now);
                return (
                  <div key={k} className="pop" onClick={() => setSel(new Date(dt))} style={{ borderRadius: 4, padding: "8px 2px", textAlign: "center", background: isSel ? INK : CARD, color: isSel ? PAPER : INK, border: isTod && !isSel ? `2px solid ${SAGEHI}` : `1px solid ${LINE}` }}>
                    <div style={{ fontSize: 9.5, fontWeight: 700, color: isSel ? MIST : MUTED }}>{"SMTWTFS"[dt.getDay()]}</div>
                    <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 17, fontWeight: 600, margin: "2px 0" }}>{dt.getDate()}</div>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", margin: "0 auto", background: exTotal && done === exTotal ? cat.color : done ? cat.color + "55" : (isSel ? "rgba(255,255,255,.25)" : LINE) }} />
                  </div>
                );
              })}
            </div>

            <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "16px 18px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><div style={{ fontSize: 11, letterSpacing: ".14em", textTransform: "uppercase", color: MIST, fontWeight: 700 }}>{selLabel}</div><div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, fontWeight: 600 }}>{doneCount}/{exTotal} done</div></div>
              <DumbbellIcon c={SAGEHI} s={30} />
            </div>
            <div style={{ display: "grid", gap: 9 }}>
              {workout.ex.map((e) => {
                const done = !!log[e.id];
                return (
                  <div key={e.id} style={{ background: done ? INK : CARD, color: done ? PAPER : INK, borderRadius: 4, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, border: done ? "none" : `1px solid ${LINE}` }}>
                    <div className="pop" onClick={() => toggleEx(e.id)} style={{ width: 28, height: 28, borderRadius: 3, border: `2px solid ${done ? SAGEHI : cat.color}`, background: done ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{done && <CheckIcon c={INK} s={15} />}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, textDecoration: done ? "line-through" : "none" }}>{e.n || "Exercise"}</div>
                      <div style={{ fontSize: 12, color: done ? "rgba(244,241,234,.6)" : MUTED }}>{[e.sets && `${e.sets} sets`, e.reps && `${e.reps} reps`, e.w && `${e.w}`].filter(Boolean).join(" · ")}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <p style={tip}>Pick a day, then check off each exercise as you finish it. The calendar on the Workouts page shows what categories you trained.</p>
          </>
        )}

        {mode === "build" && (
          <>
            <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 11, letterSpacing: ".08em", textTransform: "uppercase", color: MUTED, fontWeight: 700, marginBottom: 8 }}>Category</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {WORKOUT_CATS.map((c) => {
                  const active = (workout.cat || "other") === c.id;
                  return (
                    <div key={c.id} className="pop" onClick={() => update({ cat: c.id })}
                      style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 11px", borderRadius: 99, fontSize: 12, fontWeight: 700, cursor: "pointer",
                        background: active ? c.color : "transparent", color: active ? "#fff" : INK, border: `1px solid ${active ? c.color : LINE}` }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: active ? "#fff" : c.color }} />{c.label}
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ display: "grid", gap: 11 }}>
              {workout.ex.map((e) => (
                <div key={e.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "14px 15px" }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 9 }}>
                    <input value={e.n} onChange={(ev) => setEx(e.id, "n", ev.target.value)} placeholder="Exercise name" style={{ flex: 1, border: "none", fontSize: 15, fontWeight: 700, background: "none" }} />
                    <div className="pop" onClick={() => delEx(e.id)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={MUTED} s={15} /></div>
                  </div>
                  <div style={{ display: "flex", gap: 7 }}>
                    {[["sets", "Sets"], ["reps", "Reps"], ["w", "Weight"]].map(([f, ph]) => (
                      <div key={f} style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, letterSpacing: ".08em", textTransform: "uppercase", color: MUTED, fontWeight: 700, marginBottom: 3 }}>{ph}</div>
                        <input value={e[f]} onChange={(ev) => setEx(e.id, f, ev.target.value)} placeholder="—" style={{ width: "100%", border: `1px solid ${LINE}`, borderRadius: 3, padding: "8px 10px", fontSize: 14, fontWeight: 600, textAlign: "center" }} />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addEx} style={{ ...addBtn, marginTop: 12 }}>+ Add an exercise</button>
            <p style={tip}>Tag your workout with a category so it color-codes on the calendar. Add each exercise with its sets, reps and weight.</p>
          </>
        )}
      </div>
    </div>
  );
}

// ═══ EXISTING TOOLS (budget, habits, goals, meals) ════════════════
function Budget({ d, setD, back }) {
  const pay = Number(d.pay) || 0, spent = budgetSpent(d), left = pay - spent, pct = pay ? Math.min(1, spent / pay) : 0;
  const setRow = (key, id, field, v) => setD({ ...d, budget: { ...d.budget, [key]: (d.budget[key]||[]).map((r) => r.id === id ? { ...r, [field]: v } : r) } });
  const addRow = (key) => setD({ ...d, budget: { ...d.budget, [key]: [...(d.budget[key]||[]), { id: uid(), n: "", a: "", due: "" }] } });
  const delRow = (key, id) => setD({ ...d, budget: { ...d.budget, [key]: (d.budget[key]||[]).filter((r) => r.id !== id) } });

  // custom expense categories
  const customSections = d.customBudgetSections || [];
  const sectionColors = ["#8a6b9c", "#4f7a8c", "#C4717A", "#7d8a5e", "#a05b5b", "#5a8a7d"];
  const addSection = () => {
    const label = (typeof window !== "undefined" ? window.prompt("Name this expense category", "") : "") || "";
    const name = label.trim();
    if (!name) return;
    const key = "c_" + uid();
    const color = sectionColors[(customSections.length) % sectionColors.length];
    setD({
      ...d,
      customBudgetSections: [...customSections, { key, label: name, hint: "Custom expenses", color }],
      budget: { ...d.budget, [key]: [{ id: uid(), n: "", a: "", due: "" }] },
    });
  };
  const delSection = (key) => {
    if (typeof window !== "undefined" && !window.confirm("Remove this category and its lines?")) return;
    const nextBudget = { ...d.budget }; delete nextBudget[key];
    setD({ ...d, budget: nextBudget, customBudgetSections: customSections.filter((s) => s.key !== key) });
  };
  const allSections = [...BUDGET_SECTIONS, ...customSections.map((s) => ({ ...s, custom: true }))];

  // savings goals
  const goals = d.savingsGoals || [];
  const setGoal = (id, patch) => setD({ ...d, savingsGoals: goals.map((g) => g.id === id ? { ...g, ...patch } : g) });
  const addGoal = () => setD({ ...d, savingsGoals: [...goals, { id: uid(), n: "", target: "", saved: "", color: SAGE }] });
  const delGoal = (id) => setD({ ...d, savingsGoals: goals.filter((g) => g.id !== id) });
  const goalColors = [SAGE, AMBER, PLUM, BLUE, "#9aa777"];

  return (
    <Screen title="Budget" sub="This paycheck" back={back} accent={AMBER}>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "16px 18px", marginBottom: 14 }}>
        <label style={{ ...lbl, color: MIST }}>Take-home pay</label>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ fontSize: 30, fontFamily: "'DM Serif Display',serif", fontWeight: 600, color: SAGEHI }}>$</span><input inputMode="decimal" value={d.pay} onChange={(e) => setD({ ...d, pay: e.target.value })} placeholder="0" style={{ border: "none", flex: 1, fontSize: 30, fontFamily: "'DM Serif Display',serif", fontWeight: 600, background: "none", color: PAPER }} /></div>
      </div>
      {allSections.map((sec) => (
        <div key={sec.key} style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${sec.color}`, borderRadius: 4, padding: "15px 16px", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, gap: 8 }}>
            <div style={{ minWidth: 0 }}><div style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-.01em" }}>{sec.label}</div><div style={{ fontSize: 12, color: MUTED }}>{sec.hint}</div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ fontFamily: "'DM Serif Display',serif", fontWeight: 600, fontSize: 18, color: sec.color, whiteSpace: "nowrap" }}>${money(sectionTotal(d, sec.key))}</div>
              {sec.custom && <div className="pop" onClick={() => delSection(sec.key)} title="Remove category" style={{ cursor: "pointer", opacity: .35 }}><XIcon c={MUTED} s={15} /></div>}
            </div>
          </div>
          <div style={{ display: "grid", gap: 7 }}>
            {(d.budget[sec.key] || []).length > 0 && (
              <div style={{ display: "flex", gap: 7, alignItems: "center", flexWrap: "wrap", fontSize: 10, fontWeight: 700, letterSpacing: ".12em", color: MUTED, textTransform: "uppercase" }}>
                <div style={{ flex: "1 1 120px", minWidth: 0 }}>Item</div>
                <div style={{ width: 78, textAlign: "center" }}>Due</div>
                <div style={{ width: 96, textAlign: "center" }}>Amount</div>
                <div style={{ width: 15 }} />
              </div>
            )}
            {(d.budget[sec.key] || []).map((r) => (
              <div key={r.id} style={{ display: "flex", gap: 7, alignItems: "center", flexWrap: "wrap" }}>
                <input value={r.n} onChange={(e) => setRow(sec.key, r.id, "n", e.target.value)} placeholder="What for" style={{ flex: "1 1 120px", minWidth: 0, border: `1px solid ${LINE}`, borderRadius: 3, padding: "9px 11px", fontSize: 14, fontWeight: 500 }} />
                <div title="Day of month due (1–31)" style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 8px", width: 78, background: PAPER }}>
                  <input inputMode="numeric" maxLength={2} value={r.due || ""} onChange={(e) => { const v = e.target.value.replace(/\D/g, "").slice(0,2); setRow(sec.key, r.id, "due", v); }} placeholder="—" style={{ border: "none", width: "100%", textAlign: "center", padding: "9px 0", fontSize: 13, fontWeight: 700, background: "none" }} />
                </div>
                <div style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 10px", width: 96 }}><span style={{ color: MUTED, fontSize: 13 }}>$</span><input inputMode="decimal" value={r.a} onChange={(e) => setRow(sec.key, r.id, "a", e.target.value)} placeholder="0" style={{ border: "none", width: "100%", textAlign: "right", padding: "9px 0 9px 4px", fontSize: 14, fontWeight: 600, background: "none" }} /></div>
                <div className="pop" onClick={() => delRow(sec.key, r.id)} style={{ cursor: "pointer", opacity: .35 }}><XIcon c={MUTED} s={15} /></div>
              </div>
            ))}
          </div>
          <button onClick={() => addRow(sec.key)} style={{ marginTop: 10, background: "none", border: "none", color: sec.color, fontWeight: 700, fontSize: 13, cursor: "pointer", padding: 0 }}>+ Add a line</button>
        </div>
      ))}
      <button onClick={addSection} style={{ ...addBtn, borderColor: PLUM, color: PLUM, marginBottom: 14 }}>+ Add expense category</button>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "22px 24px", marginTop: 6 }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: MIST, marginBottom: 6 }}><span>Take-home pay</span><span style={{ fontWeight: 700, color: PAPER }}>${money(pay)}</span></div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: MIST, marginBottom: 10 }}><span>Everything assigned</span><span style={{ fontWeight: 700, color: PAPER }}>− ${money(spent)}</span></div>
        <div style={{ height: 1, background: "rgba(255,255,255,.15)", margin: "4px 0 12px" }} />
        <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", fontWeight: 700, color: left < 0 ? AMBER : MIST }}>{left < 0 ? "Over by" : "Left to allocate"}</div>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 46, fontWeight: 600, margin: "4px 0 14px", letterSpacing: "-.02em", color: left < 0 ? AMBER : PAPER }}>${money(Math.abs(left))}</div>
        <div style={{ height: 8, background: "rgba(255,255,255,.15)", overflow: "hidden" }}><div style={{ width: `${pct * 100}%`, height: "100%", background: left < 0 ? AMBER : SAGEHI, transition: "width .5s" }} /></div>
      </div>

      {/* Savings Tracker */}
      <div style={{ marginTop: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "0 2px 10px" }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: ".22em", textTransform: "uppercase", color: MUTED, fontWeight: 700 }}>Savings tracker</div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, fontWeight: 600, color: TEXT, marginTop: 4 }}>Sinking funds & goals</div>
          </div>
        </div>
        <div style={{ display: "grid", gap: 10 }}>
          {goals.map((g, i) => {
            const target = Number(g.target) || 0;
            const saved = Number(g.saved) || 0;
            const gpct = target > 0 ? Math.min(1, saved / target) : 0;
            const color = g.color || goalColors[i % goalColors.length];
            return (
              <div key={g.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${color}`, borderRadius: 4, padding: "14px 16px" }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                  <input value={g.n} onChange={(e) => setGoal(g.id, { n: e.target.value })} placeholder="Goal name" style={{ flex: 1, border: "none", background: "none", fontSize: 15, fontWeight: 700, color: TEXT }} />
                  <div className="pop" onClick={() => delGoal(g.id)} style={{ cursor: "pointer", opacity: .35 }}><XIcon c={MUTED} s={15} /></div>
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: MUTED, fontWeight: 700, letterSpacing: ".12em", marginBottom: 4 }}>SAVED</div>
                    <div style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 10px", background: PAPER }}>
                      <span style={{ color: MUTED, fontSize: 13 }}>$</span>
                      <input inputMode="decimal" value={g.saved} onChange={(e) => setGoal(g.id, { saved: e.target.value })} placeholder="0" style={{ border: "none", flex: 1, textAlign: "right", padding: "9px 0", fontSize: 14, fontWeight: 700, background: "none" }} />
                    </div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: MUTED, fontWeight: 700, letterSpacing: ".12em", marginBottom: 4 }}>GOAL</div>
                    <div style={{ display: "flex", alignItems: "center", border: `1px solid ${LINE}`, borderRadius: 3, padding: "0 10px", background: PAPER }}>
                      <span style={{ color: MUTED, fontSize: 13 }}>$</span>
                      <input inputMode="decimal" value={g.target} onChange={(e) => setGoal(g.id, { target: e.target.value })} placeholder="0" style={{ border: "none", flex: 1, textAlign: "right", padding: "9px 0", fontSize: 14, fontWeight: 700, background: "none" }} />
                    </div>
                  </div>
                </div>
                <div style={{ height: 8, background: PAPER, borderRadius: 999, overflow: "hidden", border: `1px solid ${LINE}` }}>
                  <div style={{ width: `${gpct * 100}%`, height: "100%", background: color, transition: "width .5s" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 12, color: MUTED, fontWeight: 600 }}>
                  <span>{Math.round(gpct * 100)}% there</span>
                  <span>${money(Math.max(0, target - saved))} to go</span>
                </div>
              </div>
            );
          })}
          <button onClick={addGoal} style={{ ...addBtn, borderColor: SAGE, color: SAGE }}>+ Add a savings goal</button>
        </div>
      </div>

      {(() => {
        const savedTotal = goals.reduce((s, g) => s + (Number(g.saved) || 0), 0);
        const leftFinal = left - savedTotal;
        return (
          <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "18px 22px", marginTop: 18, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: ".16em", textTransform: "uppercase", fontWeight: 700, color: leftFinal < 0 ? AMBER : MIST }}>{leftFinal < 0 ? "Over by" : "Left to allocate"}</div>
              <div style={{ fontSize: 12, color: MIST, marginTop: 4 }}>After expenses & savings (− ${money(savedTotal)})</div>
            </div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 34, fontWeight: 600, letterSpacing: "-.02em", color: leftFinal < 0 ? AMBER : PAPER }}>${money(Math.abs(leftFinal))}</div>
          </div>
        );
      })()}

      <p style={tip}>Give every dollar a job. Add a "DUE" day so bills don't sneak up. Sinking funds turn surprise costs into planned ones.</p>
    </Screen>
  );
}

function Habits({ d, setD, now, back }) {
  const [view, setView] = useState("week");
  const [sel, setSel] = useState(new Date(now));
  const selKey = dayKey(sel);
  const checks = d.habitChecks[selKey] || {};
  const oneoffs = d.habitOneoffs[selKey] || [];
  const toggleRec = (id) => { const day = { ...(d.habitChecks[selKey] || {}) }; day[id] = !day[id]; setD({ ...d, habitChecks: { ...d.habitChecks, [selKey]: day } }); };
  const renameDef = (id, v) => setD({ ...d, habitDefs: d.habitDefs.map((h) => h.id === id ? { ...h, n: v } : h) });
  const addDef = () => setD({ ...d, habitDefs: [...d.habitDefs, { id: uid(), n: "" }] });
  const delDef = (id) => setD({ ...d, habitDefs: d.habitDefs.filter((h) => h.id !== id) });
  const addOne = () => setD({ ...d, habitOneoffs: { ...d.habitOneoffs, [selKey]: [...oneoffs, { id: uid(), n: "", done: false }] } });
  const toggleOne = (id) => setD({ ...d, habitOneoffs: { ...d.habitOneoffs, [selKey]: oneoffs.map((o) => o.id === id ? { ...o, done: !o.done } : o) } });
  const renameOne = (id, v) => setD({ ...d, habitOneoffs: { ...d.habitOneoffs, [selKey]: oneoffs.map((o) => o.id === id ? { ...o, n: v } : o) } });
  const delOne = (id) => setD({ ...d, habitOneoffs: { ...d.habitOneoffs, [selKey]: oneoffs.filter((o) => o.id !== id) } });
  const [editDefs, setEditDefs] = useState(false);
  const selLabel = sel.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
  const weekStart = new Date(sel); weekStart.setDate(sel.getDate() - sel.getDay());
  const weekDays = Array.from({ length: 7 }, (_, i) => { const dt = new Date(weekStart); dt.setDate(weekStart.getDate() + i); return dt; });

  return (
    <Screen title="Habits" sub={dayKey(now) === selKey ? "Today" : "Selected day"} back={back} accent={SAGE}>
      <DayViewToggle view={view} setView={setView} />
      {view === "week"
        ? <WeekStrip weekDays={weekDays} sel={sel} setSel={setSel} now={now} doneFor={(dt) => dayCompletion(d, dt).done} totalFor={(dt) => dayCompletion(d, dt).total} />
        : <MonthGrid sel={sel} setSel={setSel} now={now} fillFor={(dt) => { const c = dayCompletion(d, dt); return c.total && c.pct === 1 ? SAGEHI : c.done ? AMBER + "33" : null; }} />}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 0 10px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: TEXT, fontFamily: "'DM Serif Display',serif" }}>{selLabel}</div>
        <div className="pop" onClick={() => setEditDefs(!editDefs)} style={{ fontSize: 12, fontWeight: 700, color: SAGE, cursor: "pointer" }}>{editDefs ? "Done" : "Edit habits"}</div>
      </div>

      {editDefs ? (
        <div style={{ display: "grid", gap: 9 }}>
          <div style={{ fontSize: 11, color: MUTED, fontWeight: 600 }}>RECURRING — show on every day</div>
          {d.habitDefs.map((h) => (
            <div key={h.id} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 4, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
              <input value={h.n} onChange={(e) => renameDef(h.id, e.target.value)} placeholder="Habit name" style={{ border: "none", flex: 1, fontSize: 15, fontWeight: 600, background: "none" }} />
              <div className="pop" onClick={() => delDef(h.id)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={MUTED} s={15} /></div>
            </div>
          ))}
          <button onClick={addDef} style={addBtn}>+ Add a recurring habit</button>
        </div>
      ) : (
        <div style={{ display: "grid", gap: 9 }}>
          {d.habitDefs.map((h) => {
            const done = !!checks[h.id]; const { current, best } = habitStreaks(d, h.id, now);
            return (
              <div key={h.id} style={{ background: done ? INK : CARD, color: done ? PAPER : INK, borderRadius: 4, padding: "15px 16px", display: "flex", alignItems: "center", gap: 12, border: done ? "none" : `1px solid ${LINE}` }}>
                <div className="pop" onClick={() => toggleRec(h.id)} style={{ width: 27, height: 27, borderRadius: 3, border: `2px solid ${done ? SAGEHI : SAGE}`, background: done ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{done && <CheckIcon c={INK} s={15} />}</div>
                <div style={{ flex: 1, fontSize: 15, fontWeight: 600, textDecoration: done ? "line-through" : "none" }}>{h.n || "Unnamed habit"}</div>
                {(current > 0 || best > 1) && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    {current > 0 && <div style={{ display: "flex", alignItems: "center", gap: 3, background: done ? "rgba(255,255,255,.12)" : AMBER + "1A", borderRadius: 20, padding: "4px 9px" }}><FlameIcon c={AMBER} s={13} /><span style={{ fontSize: 13, fontWeight: 700, color: done ? PAPER : AMBER }}>{current}</span></div>}
                    {best > 1 && <div style={{ display: "flex", alignItems: "center", gap: 3, background: done ? "rgba(255,255,255,.12)" : SAGE + "1A", borderRadius: 20, padding: "4px 9px" }}><TrophyIcon c={done ? SAGEHI : SAGE} s={12} /><span style={{ fontSize: 13, fontWeight: 700, color: done ? PAPER : SAGE }}>{best}</span></div>}
                  </div>
                )}
              </div>
            );
          })}
          {oneoffs.map((o) => (
            <div key={o.id} style={{ background: o.done ? INK : CARD, color: o.done ? PAPER : INK, borderRadius: 4, padding: "15px 16px", display: "flex", alignItems: "center", gap: 14, border: o.done ? "none" : `1px dashed ${AMBER}` }}>
              <div className="pop" onClick={() => toggleOne(o.id)} style={{ width: 27, height: 27, borderRadius: 3, border: `2px solid ${o.done ? SAGEHI : AMBER}`, background: o.done ? SAGEHI : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{o.done && <CheckIcon c={INK} s={15} />}</div>
              <input value={o.n} onChange={(e) => renameOne(o.id, e.target.value)} placeholder="Just for this day" style={{ border: "none", flex: 1, fontSize: 15, fontWeight: 600, background: "none", color: "inherit", textDecoration: o.done ? "line-through" : "none" }} />
              <div className="pop" onClick={() => delOne(o.id)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={o.done ? PAPER : MUTED} s={15} /></div>
            </div>
          ))}
          <button onClick={addOne} style={{ ...addBtn, borderStyle: "dashed", borderColor: AMBER, color: AMBER }}>+ Add a one-off for this day</button>
        </div>
      )}
      <p style={tip}>Flame = current streak. Trophy = best streak this month. Recurring habits track per day; add a one-off just for today. Everything resets monthly.</p>
    </Screen>
  );
}

function Goals({ d, setD, back }) {
  const toggle = (i) => setD({ ...d, goals: d.goals.map((g, j) => j === i ? { ...g, done: !g.done } : g) });
  const rename = (i, v) => setD({ ...d, goals: d.goals.map((g, j) => j === i ? { ...g, n: v } : g) });
  return (
    <Screen title="Goals" sub="This month" back={back} accent={AMBER}>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "18px 20px", marginBottom: 14 }}>
        <label style={{ ...lbl, color: MIST }}>Word of the month</label>
        <input value={d.intention} onChange={(e) => setD({ ...d, intention: e.target.value })} placeholder="e.g. Steady" style={{ border: "none", fontSize: 26, fontFamily: "'DM Serif Display',serif", fontWeight: 600, width: "100%", background: "none", color: PAPER }} />
      </div>
      <div style={{ display: "grid", gap: 10 }}>
        {d.goals.map((g, i) => (
          <div key={i} style={{ background: CARD, borderRadius: 4, padding: "16px 17px", display: "flex", alignItems: "center", gap: 14, border: `1px solid ${LINE}` }}>
            <div className="pop" onClick={() => toggle(i)} style={{ width: 30, height: 30, borderRadius: 3, border: `2px solid ${AMBER}`, background: g.done ? AMBER : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "'DM Serif Display',serif", fontWeight: 700, color: g.done ? "#fff" : AMBER, fontSize: 14 }}>{g.done ? <CheckIcon c="#fff" s={16} /> : i + 1}</div>
            <input value={g.n} onChange={(e) => rename(i, e.target.value)} placeholder={`Goal ${i + 1}`} style={{ border: "none", flex: 1, fontSize: 16, fontWeight: 600, background: "none" }} />
          </div>
        ))}
      </div>
      <p style={tip}>Three goals. Not ten. Focus is a kindness to your future self.</p>
    </Screen>
  );
}

function YearlyGoals({ d, setD, back }) {
  const list = d.yearlyGoals || [];
  const update = (next) => setD({ ...d, yearlyGoals: next });
  const toggle = (i) => update(list.map((g, j) => j === i ? { ...g, done: !g.done } : g));
  const rename = (i, v) => update(list.map((g, j) => j === i ? { ...g, n: v } : g));
  const add = () => update([...list, { n: "", done: false }]);
  const remove = (i) => update(list.filter((_, j) => j !== i));
  const year = new Date().getFullYear();
  return (
    <Screen title="Yearly Goals" sub={`The arc of ${year}`} back={back} accent={AMBER}>
      <div style={{ background: INK, color: PAPER, borderRadius: 4, padding: "18px 20px", marginBottom: 14 }}>
        <label style={{ ...lbl, color: MIST }}>Word of the year</label>
        <input value={d.yearIntention || ""} onChange={(e) => setD({ ...d, yearIntention: e.target.value })} placeholder="e.g. Build" style={{ border: "none", fontSize: 26, fontFamily: "'DM Serif Display',serif", fontWeight: 600, width: "100%", background: "none", color: PAPER }} />
      </div>
      <div style={{ display: "grid", gap: 10 }}>
        {list.map((g, i) => (
          <div key={i} style={{ background: CARD, borderRadius: 4, padding: "16px 17px", display: "flex", alignItems: "center", gap: 14, border: `1px solid ${LINE}` }}>
            <div className="pop" onClick={() => toggle(i)} style={{ width: 30, height: 30, borderRadius: 3, border: `2px solid ${AMBER}`, background: g.done ? AMBER : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "'DM Serif Display',serif", fontWeight: 700, color: g.done ? "#fff" : AMBER, fontSize: 14 }}>{g.done ? <CheckIcon c="#fff" s={16} /> : i + 1}</div>
            <input value={g.n} onChange={(e) => rename(i, e.target.value)} placeholder={`Goal ${i + 1}`} style={{ border: "none", flex: 1, fontSize: 16, fontWeight: 600, background: "none" }} />
            <div className="pop" onClick={() => remove(i)} style={{ cursor: "pointer", opacity: .4 }}><XIcon c={MUTED} s={14} /></div>
          </div>
        ))}
      </div>
      <button onClick={add} style={addBtn}>+ Add a yearly goal</button>
      <p style={tip}>Add as many as you'd like — but the fewer, the truer.</p>
    </Screen>
  );
}

function makeBlock(type, category, title, opts) {

  if (type === "tracker") {

function dayCompletion(d, dt) {
  const k = dayKey(dt), checks = d.habitChecks[k] || {}, oneoffs = d.habitOneoffs[k] || [];
  const doneRec = d.habitDefs.filter((h) => checks[h.id]).length, doneOne = oneoffs.filter((o) => o.done).length;
  const total = d.habitDefs.length + oneoffs.length, done = doneRec + doneOne;
  return { total, done, pct: total ? done / total : 0 };
}
function habitStreaks(d, habitId, now) {
  let current = 0; const cursor = new Date(now);
  if (!(d.habitChecks[dayKey(cursor)] || {})[habitId]) cursor.setDate(cursor.getDate() - 1);
  for (let i = 0; i < 366; i++) { if ((d.habitChecks[dayKey(cursor)] || {})[habitId]) { current++; cursor.setDate(cursor.getDate() - 1); } else break; }
  const dim = daysInMonth(now); let best = 0, run = 0;
  for (let day = 1; day <= dim; day++) { const k = `${now.getFullYear()}-${now.getMonth() + 1}-${day}`; if ((d.habitChecks[k] || {})[habitId]) { run++; if (run > best) best = run; } else run = 0; }
  return { current, best };
}
